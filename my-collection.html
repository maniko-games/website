<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Collection - Maniko HW DB</title>
    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body style="font-family: sans-serif; text-align: center; padding: 0 20px 20px 20px; background-color: #f9f9f9;">
    
    <h1 id="collection-title" style="margin-top: 20px;">My Collection</h1>
    
    <div id="cars-grid">
        <p id="status-msg">Loading your collection...</p>
    </div>

    <script type="module">
        import { injectSharedUI } from './components.js';
        import { auth, db, adjustFontSizes } from './app.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        injectSharedUI();

        const urlParams = new URLSearchParams(window.location.search);
        const isWishlist = urlParams.get('type') === 'wishlist';
        
        document.getElementById('collection-title').innerText = isWishlist ? "❤️ My Wishlist" : "🏠 My Collection";

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                document.getElementById('cars-grid').innerHTML = `
                    <p style="margin-top: 50px;">Please <a href="#" onclick="openAuth()">Login</a> to view your collection.</p>
                `;
                return;
            }
            loadUserCollection(user.uid);
        });

        async function loadUserCollection(uid) {
            try {
                // 1. Get the user's list of IDs from Firestore
                const userDoc = await getDoc(doc(db, "users", uid));
                if (!userDoc.exists()) {
                    document.getElementById('cars-grid').innerHTML = "<p>Your collection is empty. Start adding cars!</p>";
                    return;
                }

                const userData = userDoc.data();
                const listToLoad = isWishlist ? (userData.wishlist || []) : (userData.collection || []);

                if (listToLoad.length === 0) {
                    document.getElementById('cars-grid').innerHTML = `<p>No cars in your ${isWishlist ? 'wishlist' : 'collection'} yet.</p>`;
                    return;
                }

                // 2. Fetch all car data to match the IDs
                const allCarsSnap = await getDocs(collection(db, "mainline-cars"));
                const allCars = allCarsSnap.docs.map(d => ({ id: d.id, ...d.data() }));

                // 3. Filter for only the cars the user owns
                const myCars = allCars.filter(car => listToLoad.includes(car.id));

                renderGrid(myCars);
            } catch (e) {
                console.error(e);
                document.getElementById('status-msg').innerText = "Error loading collection.";
            }
        }

        function renderGrid(cars) {
            const grid = document.getElementById("cars-grid");
            grid.innerHTML = "";
            
            cars.forEach(car => {
                const ext = car.ImageExt || "jpg";
                const card = document.createElement("a");
                card.href = `carinfo.html?id=${car.id}`;
                card.className = "car-item";
                card.innerHTML = `
                    <div style="width: 100%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; background: #eee; border-radius: 8px; overflow: hidden; margin-bottom: 10px;">
                        <img src="Cars/${car.id}.${ext}" loading="lazy" style="width: 100%; height: 100%; object-fit: contain;">
                    </div>
                    <h3>${car.Model}</h3>
                `;
                grid.appendChild(card);
            });
            adjustFontSizes();
        }
    </script>
</body>
</html>
