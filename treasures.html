<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://firebasestorage.googleapis.com">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-V3WYKC0X1Q"></script>

    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-V3WYKC0X1Q');
    </script>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://github.com/maniko-games/website/blob/main/Images/sth.webp?raw=true">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<header class="global-header">
    <div class="header-top">
        <a href="hotwheels.html" class="logo">Maniko HW DB</a>
        <div class="search-container">
            <input type="text" id="global-search" placeholder="Search" oninput="handleGlobalSearch()" autocomplete="off">
            <div id="search-dropdown"></div>
        </div>
    </div>
</header>
<div class="header-spacer"></div>

<body style="font-family: sans-serif; text-align: center; padding: 0 20px 20px 20px; background-color: #f9f9f9;">
    <h1 id="page-title" style="margin-top: 20px;">Loading Treasures...</h1>

    <div id="cars-grid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
        import { firebaseConfig } from './app.js';

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // --- GLOBAL SEARCH LOGIC ---
        let cachedCars = [];
        let searchDebounceTimer;

        async function preloadSearchData() {
            try {
                const querySnapshot = await getDocs(collection(db, "mainline-cars"));
                cachedCars = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            } catch (e) { console.error("Search preload failed", e); }
        }
        preloadSearchData();

        window.handleGlobalSearch = function() {
            clearTimeout(searchDebounceTimer);
            const queryVal = document.getElementById('global-search').value.toLowerCase().trim();
            const dropdown = document.getElementById('search-dropdown');
            if (queryVal.length < 2) { dropdown.style.display = 'none'; return; }

            searchDebounceTimer = setTimeout(() => {
                if (cachedCars.length === 0) return;
                const matches = cachedCars.filter(car => car.Model.toLowerCase().includes(queryVal));
                matches.sort((a, b) => a.Model.toLowerCase().localeCompare(b.Model.toLowerCase()));
                renderSuggestions(matches);
            }, 200);
        };

        function renderSuggestions(matches) {
            const dropdown = document.getElementById('search-dropdown');
            dropdown.innerHTML = "";
            if (matches.length === 0) { dropdown.style.display = 'none'; return; }

            matches.forEach(car => {
                const div = document.createElement("div");
                div.className = "search-suggestion";
                const type = car["Super TH"] ? "STH" : (car["TH"] ? "TH" : "Mainline");
                const caseName = Array.isArray(car.Case) ? car.Case[0] : car.Case;
                div.innerHTML = `<span class="suggestion-type">${type}</span>${car.Model} <small style="color: #bbb; margin-left: 8px;">(${caseName})</small>`;
                div.onclick = () => {
                    dropdown.style.display = 'none';
                    window.location.href = `carinfo.html?id=${car.id}`;
                };
                dropdown.appendChild(div);
            });
            dropdown.style.display = 'block';
        }

        window.addEventListener('click', (e) => {
            if (!e.target.matches('#global-search')) {
                const dd = document.getElementById('search-dropdown');
                const searchInput = document.getElementById('global-search');
                if (dd) dd.style.display = 'none';
                if (searchInput) searchInput.value = ""; 
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === "Escape") {
                document.getElementById('search-dropdown').style.display = 'none';
                document.getElementById('global-search').value = "";
            }
        });

        // --- EXISTING TREASURES LOGIC ---
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type');

        const cleanType = type === "STH" ? "Super Treasure Hunts" : "Treasure Hunts";
        document.title = `${cleanType} List - Maniko Hot Wheels`;

        const titleElement = document.getElementById("page-title");
        titleElement.innerText = type === "STH" ? "🔥 Super Treasure Hunts" : "💎 Treasure Hunts";

        // --- THE SHRINKER FUNCTION ---
        function adjustFontSizes() {
            const titles = document.querySelectorAll('#cars-grid h3');
            titles.forEach(title => {
                let fontSize = 1.0; 
                // Decrease font size until it fits in the 2-line box (min-height/max-height in CSS)
                while (title.scrollHeight > title.offsetHeight && fontSize > 0.5) {
                    fontSize -= 0.03; 
                    title.style.fontSize = fontSize + 'em';
                }
            });
        }

        async function loadTreasures() {
            const grid = document.getElementById("cars-grid");
            gtag('event', 'view_treasure_list', { 'treasure_type': type });

            try {
                const carsRef = collection(db, "mainline-cars");
                const fieldToFilter = type === "STH" ? "Super TH" : "TH";
                const q = query(carsRef, where(fieldToFilter, "==", true));

                const querySnapshot = await getDocs(q);
                let cars = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                // Sort: Year DESC, then Case Letter DESC
                cars.sort((a, b) => {
                    const getSortData = (car) => {
                        const caseStr = Array.isArray(car.Case) ? car.Case[0] : car.Case;
                        const year = parseInt(caseStr.match(/\d{4}$/)) || 0;
                        const letter = caseStr.trim().charAt(0).toUpperCase();
                        return { year, letter };
                    };
                    const dataA = getSortData(a);
                    const dataB = getSortData(b);
                    if (dataB.year !== dataA.year) return dataB.year - dataA.year;
                    if (dataB.letter !== dataA.letter) return dataB.letter > dataA.letter ? 1 : -1;
                    return a.Model.localeCompare(b.Model);
                });

                grid.innerHTML = "";

                const cardPromises = cars.map(async (carData) => {
                    const carId = carData.id;
                    const ext = carData.ImageExt || "jpg";
                    
                    const carCard = document.createElement("a");
                    carCard.href = `carinfo.html?id=${carId}`;
                    // Let style.css handle the class/look, we only keep link behavior here
                    
                    carCard.innerHTML = `
                        <div style="width: 100%; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; overflow: hidden; background-color: #eee; border-radius: 8px; margin-bottom: 10px;">
                            <img id="img-${carId}" 
                                src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII="
                                alt="Hot Wheels ${carData.Model}"
                                loading="lazy"
                                style="width: 100%; height: 100%; object-fit: contain; opacity: 0; transition: opacity 0.3s ease;">
                        </div>
                        <h3>${carData.Model}</h3>
                        <p style="color: #555;"><strong>Case:</strong> ${
                            (Array.isArray(carData.Case) ? carData.Case : [carData.Case]).map(c => 
                            `<span style="color: #2196F3; text-decoration: underline;" 
                                onclick="event.preventDefault(); event.stopPropagation(); window.location.href='case.html?name=${encodeURIComponent(c)}'">
                                ${c}
                            </span>`).join(', ')
                        }</p>
                    `;
                    grid.appendChild(carCard);

                    try {
                        const url = await getDownloadURL(ref(storage, `${carId}.${ext}`));
                        const img = document.getElementById(`img-${carId}`);
                        if (img) {
                            img.src = url;
                            img.onload = () => img.style.opacity = "1";
                        }
                    } catch (e) { console.warn(carId); }
                });

                // WAIT for all cards to be in the DOM
                await Promise.all(cardPromises);
                
                // RUN the shrinker after a tiny delay to ensure layout is ready
                setTimeout(adjustFontSizes, 100);

            } catch (error) {
                console.error(error);
                grid.innerHTML = `<p style="color:red;">Error loading treasures.</p>`;
            }
        }

        loadTreasures();
    </script>
</body>
</html>
