<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://firebasestorage.googleapis.com">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-V3WYKC0X1Q"></script>

    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-V3WYKC0X1Q');
    </script>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://github.com/maniko-games/website/blob/main/Images/sth.webp?raw=true">
    <link rel="stylesheet" href="style.css?v=1.1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<header class="global-header">
    <div class="header-top">
        <a href="hotwheels.html" class="logo">Maniko HW DB</a>
        <div class="search-container">
            <input type="text" id="global-search" placeholder="Search" oninput="handleGlobalSearch()" autocomplete="off">
            <div id="search-dropdown"></div>
        </div>
    </div>
</header>
<div class="header-spacer"></div>

<body style="font-family: sans-serif; text-align: center; padding: 0 20px 20px 20px; background-color: #f9f9f9;">
    <h1 id="page-title" style="margin-top: 20px;">Loading Treasures...</h1>

    <div id="year-filter" style="margin: 20px auto; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
        <button onclick="filterByYear('All')" class="filter-btn active">All</button>
        <button onclick="filterByYear('2026')" class="filter-btn">2026</button>
        <button onclick="filterByYear('2025')" class="filter-btn">2025</button>
        <button onclick="filterByYear('2024')" class="filter-btn">2024</button>
    </div>

    <div id="cars-grid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { firebaseConfig } from './app.js';

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- SHARED DATA ---
        let cachedCars = [];
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type'); // "STH" or "TH"

        const cleanType = type === "STH" ? "Super Treasure Hunts" : "Treasure Hunts";
        document.title = `${cleanType} List - Maniko Hot Wheels`;
        document.getElementById("page-title").innerText = type === "STH" ? "🔥 Super Treasure Hunts" : "💎 Treasure Hunts";

        // --- 1. THE LOAD & FILTER LOGIC ---
        let currentTreasures = []; // Keep a global reference to the treasures found

        async function startPage() {
            const grid = document.getElementById("cars-grid");
            grid.innerHTML = "<p>Loading treasures...</p>";

            try {
                if (cachedCars.length === 0) {
                    const querySnapshot = await getDocs(collection(db, "mainline-cars"));
                    cachedCars = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                }

                const fieldToFilter = type === "STH" ? "Super TH" : "TH";
                
                // Store the filtered results globally
                currentTreasures = cachedCars.filter(car => car[fieldToFilter] === true);

                // Initial Sort
                currentTreasures.sort((a, b) => {
                    const dataA = getSortData(a);
                    const dataB = getSortData(b);
                    if (dataB.year !== dataA.year) return dataB.year - dataA.year;
                    if (dataB.letter !== dataA.letter) return dataB.letter > dataA.letter ? 1 : -1;
                    return a.Model.localeCompare(b.Model);
                });

                renderGrid(currentTreasures);
            } catch (e) {
                console.error(e);
                grid.innerHTML = "<p>Error loading treasures.</p>";
            }
        }

        // Helper to extract Year and Letter from Case string
        function getSortData(car) {
            const caseStr = Array.isArray(car.Case) ? car.Case[0] : car.Case;
            const yearMatch = caseStr.match(/\d{4}$/);
            const year = yearMatch ? parseInt(yearMatch[0]) : 0;
            const letter = caseStr.trim().charAt(0).toUpperCase();
            return { year, letter };
        }

        window.filterByYear = function(year) {
            console.log("Filtering by:", year); // Check your console to see if this triggers

            // Update button styles
            document.querySelectorAll('.filter-btn').forEach(btn => {
                // This matches the text inside the button to the year passed
                if (btn.innerText === year) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            if (year === 'All') {
                renderGrid(currentTreasures);
            } else {
                const filtered = currentTreasures.filter(car => {
                    const data = getSortData(car);
                    return data.year === parseInt(year);
                });
                renderGrid(filtered);
            }
        };

        // --- 2. THE RENDER LOGIC ---
        function renderGrid(cars) {
            const grid = document.getElementById("cars-grid");
            grid.innerHTML = "";

            if (cars.length === 0) {
                grid.innerHTML = "<p>No treasures found.</p>";
                return;
            }

            cars.forEach(carData => {
                const carId = carData.id;
                const ext = carData.ImageExt || "jpg";

                const carCard = document.createElement("a");
                carCard.href = `carinfo.html?id=${carId}`;
                carCard.className = "car-item";

                carCard.innerHTML = `
                    <div style="width: 100%; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; overflow: hidden; background-color: #eee; border-radius: 8px; margin-bottom: 10px;">
                        <img src="Cars/${carId}.${ext}" 
                            alt="Hot Wheels ${carData.Model}"
                            loading="lazy" 
                            style="width: 100%; height: 100%; object-fit: contain;">
                    </div>
                    <h3>${carData.Model}</h3>
                    <p style="color: #555;"><strong>Case:</strong> ${
                        (Array.isArray(carData.Case) ? carData.Case : [carData.Case]).map(c => 
                        `<span style="color: #2196F3; text-decoration: underline;" 
                            onclick="event.preventDefault(); event.stopPropagation(); window.location.href='case.html?name=${encodeURIComponent(c)}'">
                            ${c}
                        </span>`).join(', ')
                    }</p>
                `;
                grid.appendChild(carCard);
            });

            setTimeout(adjustFontSizes, 50);
        }

        // --- 3. UTILITIES (Font & Search) ---
        function adjustFontSizes() {
            document.querySelectorAll('#cars-grid h3').forEach(title => {
                let fontSize = 1.0;
                while (title.scrollHeight > title.offsetHeight && fontSize > 0.5) {
                    fontSize -= 0.03;
                    title.style.fontSize = fontSize + 'em';
                }
            });
        }

        // Global Search Logic (Syncs with the header)
        window.handleGlobalSearch = function() {
            const queryVal = document.getElementById('global-search').value.toLowerCase().trim();
            const dropdown = document.getElementById('search-dropdown');
            if (queryVal.length < 2) { dropdown.style.display = 'none'; return; }

            const matches = cachedCars.filter(car => car.Model.toLowerCase().includes(queryVal))
                .sort((a, b) => a.Model.localeCompare(b.Model))
                .slice(0, 10);
                
            renderSuggestions(matches);
        };

        function renderSuggestions(matches) {
            const dropdown = document.getElementById('search-dropdown');
            dropdown.innerHTML = "";
            if (matches.length === 0) { dropdown.style.display = 'none'; return; }

            matches.forEach(car => {
                const div = document.createElement("div");
                div.className = "search-suggestion";
                div.innerHTML = car.Model;
                div.onclick = () => window.location.href = `carinfo.html?id=${car.id}`;
                dropdown.appendChild(div);
            });
            dropdown.style.display = 'block';
        }

        // Initialize
        startPage();
    </script>
</body>
</html>
