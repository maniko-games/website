<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://firebasestorage.googleapis.com">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-V3WYKC0X1Q"></script>

    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-V3WYKC0X1Q');
    </script>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://github.com/maniko-games/website/blob/main/Images/th.png?raw=true">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* 1. Mobile Phone: Force 3 columns */
        #cars-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Forces exactly 3 columns */
            gap: 8px; /* Smaller gap for small screens */
            padding: 5px;
            min-height: 800px;
            justify-content: center;
        }

        /* 2. iPad / Tablets: Target 4 columns (Width > 600px) */
        @media (min-width: 600px) {
            #cars-grid {
                grid-template-columns: repeat(3, 1fr); /* Forces exactly 4 columns */
                gap: 15px;
                padding: 15px;
            }
        }

        /* 3. Laptops / Desktop: Comfortable grid (Width > 1024px) */
        @media (min-width: 1024px) {
            #cars-grid {
                /* On big screens, let it auto-fill with a nice 220px size */
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                gap: 20px;
                margin: 0 auto;
            }
        }
        
        /* Ensure images don't break the small containers */
        #cars-grid img {
            width: 100%;
            height: auto;
        }
    </style>
</head>

<body style="font-family: sans-serif; text-align: center; padding: 20px; background-color: #f9f9f9;">

    <div style="display: flex; gap: 15px; margin-bottom: 20px; align-items: center;">
        <a href="#" onclick="window.history.back(); return false;" 
        style="text-decoration: none; color: #2196F3; font-weight: bold;">
        ← Back
        </a>
        <span style="color: #ccc;">|</span>
        <a href="hotwheels.html" 
        style="text-decoration: none; color: #2196F3; font-weight: bold;">
        Home
        </a>
    </div>

    <h1 id="page-title">Loading Treasures...</h1>

    <div id="cars-grid"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAkdQrNE0jswL4xfAEM4uHtHyzPwn2o3bU",
            authDomain: "maniko-hotwheels.firebaseapp.com",
            projectId: "maniko-hotwheels",
            storageBucket: "maniko-hotwheels.firebasestorage.app",
            messagingSenderId: "534387805003",
            appId: "1:534387805003:web:9b78747f3538b58194b6ce",
            measurementId: "G-V3WYKC0X1Q"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type'); // "TH" or "STH"

        const cleanType = type === "STH" ? "Super Treasure Hunts" : "Treasure Hunts";
        document.title = `${cleanType} List - Maniko Hot Wheels`;

        const metaDesc = document.querySelector('meta[name="description"]') || document.createElement('meta');
        metaDesc.name = "description";
        metaDesc.content = `Complete database of Hot Wheels ${cleanType}. Browse cases and high-res images for 2024-2026.`;
        if (!document.querySelector('meta[name="description"]')) document.head.appendChild(metaDesc);

        const titleElement = document.getElementById("page-title");
        titleElement.innerText = type === "STH" ? "🔥 Super Treasure Hunts" : "💎 Treasure Hunts";

        async function loadTreasures() {
            const grid = document.getElementById("cars-grid");
            gtag('event', 'view_treasure_list', {
                'treasure_type': type
            });
            try {
                const carsRef = collection(db, "mainline-cars");
                
                // Determine which field to filter by
                const fieldToFilter = type === "STH" ? "Super TH" : "TH";
                const q = query(carsRef, where(fieldToFilter, "==", true));

                const querySnapshot = await getDocs(q);
                let cars = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                // Manual sort by Year (Newest first)
                cars.sort((a, b) => {
                    const getYear = (c) => parseInt((Array.isArray(c.Case) ? c.Case[0] : c.Case).slice(-4)) || 0;
                    return getYear(b) - getYear(a);
                });

                grid.innerHTML = "";

                const cardPromises = cars.map(async (carData) => {
                    const carId = carData.id;
                    const ext = carData.ImageExt || "jpg";
                    
                    // 1. Create an anchor tag instead of a div
                    const carCard = document.createElement("a");
                    carCard.href = `carinfo.html?id=${carId}`; // Link to details
                    
                    // 2. Add styling and hover effects
                    carCard.style = "background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; text-decoration: none; color: #333; transition: transform 0.2s ease;";
                    
                    carCard.onmouseover = () => carCard.style.transform = "scale(1.02)";
                    carCard.onmouseout = () => carCard.style.transform = "scale(1)";

                    // 3. Build the card HTML
                    carCard.innerHTML = `
                        <div style="width: 100%; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; overflow: hidden; background-color: #eee; border-radius: 8px; margin-bottom: 10px;">
                            <img id="img-${carId}" 
                                src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII="
                                alt="Hot Wheels ${carData.Model}"
                                loading="lazy"
                                style="width: 100%; height: 100%; object-fit: contain; opacity: 0; transition: opacity 0.3s ease;">
                        </div>
                        <h3 style="margin: 10px 0; font-size: 1.1em;">${carData.Model}</h3>
                        <p style="color: #555; margin: 5px 0;"><strong>Case:</strong> ${
                            (Array.isArray(carData.Case) ? carData.Case : [carData.Case]).map(c => 
                            // We use onclick="event.stopPropagation()" so clicking the Case link 
                            // doesn't accidentally trigger the Car Detail link
                            `<span style="color: #2196F3; text-decoration: underline;" 
                                onclick="event.preventDefault(); event.stopPropagation(); window.location.href='case.html?name=${encodeURIComponent(c)}'">
                                ${c}
                            </span>`).join(', ')
                        }</p>
                    `;
                    grid.appendChild(carCard);

                    // Image fetch logic stays exactly the same below...

                    try {
                        const url = await getDownloadURL(ref(storage, `${carId}.${ext}`));
                        const img = document.getElementById(`img-${carId}`);
                        img.src = url;
                        img.onload = () => img.style.opacity = "1";
                    } catch (e) { console.warn(e); }
                });

                await Promise.all(cardPromises);

            } catch (error) {
                console.error(error);
                grid.innerHTML = `<p style="color:red;">Error loading treasures.</p>`;
            }
        }
        loadTreasures();
    </script>
</body>
</html>
