<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://firebasestorage.googleapis.com">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-V3WYKC0X1Q"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-V3WYKC0X1Q');
    </script>

    <meta charset="UTF-8">
    <title>Case View - Maniko Hot Wheels</title>
    <link rel="icon" type="image/png" href="https://github.com/maniko-games/website/blob/main/Images/sth.webp?raw=true">
    <link rel="stylesheet" href="style.css?v=1.1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>


<body style="font-family: sans-serif; text-align: center; padding: 0 20px 20px 20px; background-color: #f9f9f9;">
    <div class="header-spacer"></div>
    <h1 id="case-title" style="margin-top: 20px;">Loading Case...</h1>

    <div id="case-filters" style="margin: 20px auto; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
        <button onclick="filterCase('all')" class="filter-btn active" id="filter-all">All</button>
        <button onclick="filterCase('owned')" class="filter-btn" id="filter-owned">Collected</button>
        <button onclick="filterCase('missing')" class="filter-btn" id="filter-missing">Missing</button>
        <button onclick="filterCase('wishlist')" class="filter-btn" id="filter-wishlist">Wishlist</button>
    </div>

    <div id="cars-grid"></div>

    <script type="module">
        import { injectSharedUI } from './components.js';
        import { app, db, adjustFontSizes, firebaseConfig, auth } from './app.js';
        import { collection, getDocs, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        injectSharedUI();

        // --- SHARED DATA ---
        let cachedCars = [];
        let caseMatches = []; // Store the specific case cars here for filtering
        const urlParams = new URLSearchParams(window.location.search);
        const caseName = urlParams.get('name'); // e.g. "D - 2026"
        const cleanCase = caseName || "Hot Wheels";
        
        document.title = `${cleanCase} List - Maniko Hot Wheels Database`;
        document.getElementById("case-title").innerText = "Case: " + cleanCase;

        // --- 1. THE LOAD & FILTER LOGIC ---
        async function startPage() {
            const grid = document.getElementById("cars-grid");
            grid.innerHTML = "<p>Loading cars...</p>";

            try {
                // Fetch everything once (or use cache if search already loaded it)
                if (cachedCars.length === 0) {
                    const querySnapshot = await getDocs(collection(db, "mainline-cars"));
                    cachedCars = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                }

                // Filter for this specific case locally (Instant)
                const matches = cachedCars.filter(car => {
                    const cases = Array.isArray(car.Case) ? car.Case : [car.Case];
                    return cases.includes(caseName);
                });

                // Store matches globally so filterCase can see them
                caseMatches = cachedCars.filter(car => {
                    const cases = Array.isArray(car.Case) ? car.Case : [car.Case];
                    return cases.includes(caseName);
                });

                renderGrid(sortCars(caseMatches));

                // Sort: STH first, then TH, then Alpha
                matches.sort((a, b) => {
                    if (b["Super TH"] !== a["Super TH"]) return b["Super TH"] - a["Super TH"];
                    if (b["TH"] !== a["TH"]) return b["TH"] - a["TH"];
                    return a.Model.localeCompare(b.Model);
                });

                renderGrid(matches);
            } catch (e) {
                console.error(e);
                grid.innerHTML = "<p>Error loading collection.</p>";
            }
        }

        window.filterCase = async function(mode) {
            // 1. Update active button UI
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`filter-${mode}`).classList.add('active');

            if (mode === 'all') {
                renderGrid(caseMatches);
                return;
            }

            // 2. Get user data to compare
            const user = auth.currentUser;
            if (!user) {
                window.openAuth();
                return;
            }

            // Import getDoc/doc if not already available in this scope
            const { getDoc, doc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
            const userSnap = await getDoc(doc(db, "users", user.uid));
            const userData = userSnap.exists() ? userSnap.data() : {};
            const ownedIds = userData.collection || [];
            const wishIds = userData.wishlist || [];

            // 3. Filter based on mode
            let filtered;
            if (mode === 'owned') {
                filtered = caseMatches.filter(car => ownedIds.includes(car.id));
            } else if (mode === 'missing') {
                filtered = caseMatches.filter(car => !ownedIds.includes(car.id));
            } else if (mode === 'wishlist') {
                filtered = caseMatches.filter(car => wishIds.includes(car.id));
            }

            renderGrid(sortCars(filtered));

            renderGrid(filtered);
        };

        // --- 2. THE RENDER LOGIC ---
        function renderGrid(cars) {
            const grid = document.getElementById("cars-grid");
            grid.innerHTML = "";

            if (cars.length === 0) {
                grid.innerHTML = "<p>No cars found for this case.</p>";
                return;
            }

            cars.forEach(carData => {
                const carId = carData.id;
                const ext = carData.ImageExt || "jpg";
                let typeLabel = carData["Super TH"] ? "STH" : (carData["TH"] ? "TH" : "Mainline");
                let typeColor = carData["Super TH"] ? "#e67e22" : (carData["TH"] ? "#95a5a6" : "#555");

                const carCard = document.createElement("a");
                carCard.href = `carinfo.html?id=${carId}`;
                carCard.className = "car-item"; // Use your CSS class for hover effects

                carCard.innerHTML = `
                    <div style="width: 100%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; overflow: hidden; background-color: #eee; border-radius: 8px; margin-bottom: 10px;">
                        <img src="Cars/${carId}.${ext}" loading="lazy" style="width: 100%; height: 100%; object-fit: contain;">
                    </div>
                    <h3>${carData.Model}</h3>
                    <p style="font-weight: bold; color: ${typeColor}; margin-bottom: 10px;">${typeLabel}</p>
                    
                    <div class="grid-controls" style="display: flex; gap: 8px; justify-content: center; align-items: center; border-top: 1px solid #f0f0f0; padding-top: 10px;">
                        <button onclick="event.preventDefault(); toggleOwnership('collection', '${carId}', this)" class="mini-btn collection-btn">➕</button>
                        <button onclick="event.preventDefault(); toggleOwnership('wishlist', '${carId}', this)" class="mini-btn wishlist-btn">🩶</button>
                    </div>
                `;
                grid.appendChild(carCard);
            });

            if (auth.currentUser) {
                window.checkGridStatuses(); 
            }

            // Shrink long text to fit
            setTimeout(adjustFontSizes, 50);
        }

        onAuthStateChanged(auth, (user) => {
            if (user && document.querySelectorAll('.car-item').length > 0) {
                window.checkGridStatuses();
            }
        });

        // Reuse cached data for the global search bar
        window.handleGlobalSearch = function() {
            const queryVal = document.getElementById('global-search').value.toLowerCase().trim();
            const dropdown = document.getElementById('search-dropdown');
            if (queryVal.length < 2) { dropdown.style.display = 'none'; return; }

            const matches = cachedCars.filter(car => car.Model.toLowerCase().includes(queryVal))
                .sort((a, b) => a.Model.localeCompare(b.Model))
                .slice(0, 10); // Limit suggestions for speed
                
            renderSuggestions(matches);
        };

        function renderSuggestions(matches) {
            const dropdown = document.getElementById('search-dropdown');
            dropdown.innerHTML = "";
            if (matches.length === 0) { dropdown.style.display = 'none'; return; }

            matches.forEach(car => {
                const div = document.createElement("div");
                div.className = "search-suggestion";
                const type = car["Super TH"] ? "STH" : (car["TH"] ? "TH" : "Mainline");
                div.innerHTML = `<span class="suggestion-type">${type}</span>${car.Model}`;
                div.onclick = () => window.location.href = `carinfo.html?id=${car.id}`;
                dropdown.appendChild(div);
            });
            dropdown.style.display = 'block';
        }

        function sortCars(carList) {
            return carList.sort((a, b) => {
                // 1. Super THs first
                if (b["Super TH"] !== a["Super TH"]) return b["Super TH"] - a["Super TH"];
                // 2. Regular THs second
                if (b["TH"] !== a["TH"]) return b["TH"] - a["TH"];
                // 3. Alphabetical by Model name
                return a.Model.localeCompare(b.Model);
            });
        }

        // Start everything
        startPage();
    </script>
</body>
</html>
