<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add car</title>
    <link rel="icon" type="image/png" href="https://github.com/maniko-games/website/blob/main/Images/th.png?raw=true">
    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body style="font-family: sans-serif; padding: 40px; max-width: 500px; margin: auto;">

    <div class="header-spacer"></div>

    <h1>Add New / Edit Hot Wheels</h1>
    <div style="display: flex; flex-direction: column; gap: 10px;">
        
        <div style="display: flex; flex-direction: column; gap: 5px;">
            <div style="display: flex; gap: 5px;">
                <input type="text" id="modelCode" placeholder="Code" style="width: 80px; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
                <input type="text" id="modelName" placeholder="Model Name (e.g. '92 Dodge Viper RT/10)" style="flex-grow: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;">
                <button type="button" id="btnSearch" style="padding: 5px 15px; cursor: pointer; background: #FF9800; color: white; border: none; border-radius: 4px; font-weight: bold;">
                    Search 🔍
                </button>
            </div>
        </div>

        <div id="search-results-admin" class="admin-search-results">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <span style="font-size: 0.8em; font-weight: bold; color: #856404;">Existing Models Found:</span>
                <button onclick="document.getElementById('search-results-admin').style.display='none'" style="background: none; border: none; cursor: pointer; color: #856404; font-weight: bold;">Close ×</button>
            </div>
            <div id="admin-results-grid" style="display: flex; flex-direction: column; gap: 10px;"></div>
        </div>

        <div style="margin-bottom: 15px;">
            <label>Year</label>
            <select id="year-select" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box;">
                <option value="">Loading years...</option>
            </select>
        </div>

        <div id="case-container" style="display: flex; flex-direction: column; gap: 5px;">
            <label style="font-size: 0.8em; color: #666;">Select Case(s):</label>
        </div>

        <button type="button" id="btnAddCase" style="margin-bottom: 10px; padding: 5px; cursor: pointer; background: #ddd; border: 1px solid #ccc; font-size: 0.8em;">
            + Add another Case
        </button>
        
        <div style="display: flex; gap: 20px; align-items: center; margin: 15px 0; background: #eee; padding: 15px; border-radius: 12px;">
            <div id="edit-preview-container" style="width: 100px; height: 100px; background: #ddd; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 2px solid #ccc;">
                <img id="edit-preview-img" src="" style="width: 100%; height: 100%; object-fit: contain; display: none;">
                <span id="edit-preview-placeholder" style="font-size: 0.7em; color: #999; text-align: center;">No Image Loaded</span>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 0.85em;">
                <label><input type="checkbox" id="isPremium"> Premium?</label>
                <label><input type="checkbox" id="isChase"> Chase?</label>
                <label><input type="checkbox" id="isSilver"> Silver Series?</label>
                <label><input type="checkbox" id="isSuper"> Super TH?</label>
                <label><input type="checkbox" id="isColorShifter"> Color Shifter?</label>
                <label><input type="checkbox" id="isTH"> Regular TH?</label>
                <label><input type="checkbox" id="isMultipack"> Multipack Excl?</label>
                <label><input type="checkbox" id="isWalmart"> Walmart Excl?</label>
                <input type="checkbox" id="iLike" style="display:none">
                <input type="checkbox" id="iOwn" style="display:none">
            </div>
        </div>

        <div style="margin-bottom: 15px;">
            <label>Collector # (e.g., 142)</label>
            <input type="number" id="collector-num" placeholder="142" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box;">
        </div>

        <div style="margin-bottom: 15px;">
            <label>Series</label>
            <select id="series-select" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box;">
                <option value="">Select a Year first...</option>
            </select>
        </div>

        <div style="margin-bottom: 15px;">
            <label>Series # (e.g., 3)</label>
            <input type="number" id="series-num" placeholder="3" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box;">
        </div>

        <label style="font-size: 0.8em; color: #666;">Generated Document ID (Filename):</label>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="docId" placeholder="Auto-generated ID" readonly 
                   style="background: #eee; border: 1px solid #ccc; padding: 8px; flex-grow: 1; font-family: monospace;">
            <button id="btnCopy" style="padding: 5px 15px; cursor: pointer; background: #607d8b; color: white; border: none; border-radius: 4px;">
                Copy
            </button>
        </div>

        <label style="font-size: 0.8em; color: #666; margin-top: 5px;">Upload Car Photo (.jpg):</label>
        <input type="file" id="imageInput" accept="image/jpeg, image/webp">
        
        <div id="duplicate-warning" style="display: none; background: #fff3cd; border: 1px solid #ffeeba; border-radius: 8px; padding: 15px; margin: 10px 0; text-align: left;">
            <p style="color: #856404; font-weight: bold; margin-top: 0;">⚠️ A car with this ID already exists!</p>
            <p style="font-size: 0.85em; color: #666;">What would you like to do?</p>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button id="btnOverwrite" style="background: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;">Overwrite</button>
                <button id="btnCreateNew" style="background: #27ae60; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; font-weight: bold;">Create New (with index)</button>
            </div>
        </div>

        <button id="btnSave" style="margin-top: 20px; padding: 15px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1em;">Save Data & Upload Image</button>
        <p id="status" style="font-weight: bold;"></p>
    </div>

    <script type="module">
        let isEditMode = false;
        let editingCarId = null;

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { injectSharedUI } from './components.js';
        import { db, auth } from './app.js';

        injectSharedUI();

        const modelInput = document.getElementById("modelName");
        const codeInput = document.getElementById("modelCode");
        const idOutput = document.getElementById("docId");
        const status = document.getElementById("status");
        const imageInput = document.getElementById("imageInput");
        const superCheckbox = document.getElementById("isSuper");
        const caseContainer = document.getElementById("case-container");
        const warningBox = document.getElementById("duplicate-warning");
        const CASE_LETTERS = ['A','B','C','D','E','F','G','H','J','K','L','M','N','P','Q', 'Multipack', '-'];

        function generateId() {
            let model = modelInput.value.toLowerCase().replace(/[^a-z0-9 ]/g, "").trim();
            let code = codeInput.value.toLowerCase().replace(/[^a-z0-9]/g, "").trim();
            const firstSelect = document.querySelector(".case-select");
            let firstCase = firstSelect ? firstSelect.value.toLowerCase().replace(/[^a-z0-9 ]/g, "").trim() : "";
            let suffix = superCheckbox.checked ? "-super" : "";
            let combined = `${model}${code ? '-' + code : ''}-${firstCase}${suffix}`;
            let cleanId = combined.replace(/\s+/g, "-").replace(/-+/g, "-"); 
            idOutput.value = cleanId;
        }

        modelInput.addEventListener("input", generateId);
        codeInput.addEventListener("input", generateId);
        superCheckbox.addEventListener("change", generateId);
        caseContainer.addEventListener("change", (e) => { if (e.target.classList.contains("case-select")) generateId(); });

        document.getElementById("btnSave").addEventListener("click", async () => {
            const id = idOutput.value;
            const file = imageInput.files[0];
            if (!id || (!file && !isEditMode)) { alert("ID and Image are required!"); return; }
            try {
                status.innerText = "🔍 Checking...";
                const docSnap = await getDoc(doc(db, "mainline-cars", id));
                if (docSnap.exists() && !isEditMode) {
                    warningBox.style.display = "block";
                    document.getElementById("btnOverwrite").onclick = () => executeSave(id);
                } else { executeSave(id); }
            } catch (e) { status.innerText = "❌ Error: " + e.message; }
        });

        async function executeSave(finalId) {
            warningBox.style.display = "none";
            const file = imageInput.files[0];
            let extension = file ? file.name.split('.').pop().toLowerCase() : "jpg";
            if (extension === "jpeg") extension = "jpg";

            try {
                const yearId = document.getElementById('year-select').value;
                const seriesId = document.getElementById('series-select').value;

                const newCar = {
                    "Model": modelInput.value,
                    "ModelCode": codeInput.value,
                    "Case": Array.from(document.querySelectorAll(".case-select")).map(s => s.value).filter(v => v !== ""),
                    "Super TH": superCheckbox.checked,
                    "TH": document.getElementById("isTH").checked,
                    "Color Shifter": document.getElementById("isColorShifter").checked,
                    "Multipack Exclusive": document.getElementById("isMultipack").checked,
                    "Walmart Exclusive": document.getElementById("isWalmart").checked,
                    "Silver Series": document.getElementById("isSilver").checked,
                    "Premium": document.getElementById("isPremium").checked,
                    "Chase": document.getElementById("isChase").checked,
                    "ImageExt": extension,
                    "I like?": document.getElementById("iLike").checked,
                    "I own?": document.getElementById("iOwn").checked,
                    CollectorNumber: parseInt(document.getElementById('collector-num').value) || 0,
                    SeriesNumber: parseInt(document.getElementById('series-num').value) || 0,
                    Year: doc(db, "years", yearId),
                    Series: doc(db, "series", seriesId),
                };

                await setDoc(doc(db, "mainline-cars", finalId), newCar);
                if (file) triggerLocalDownload(file, finalId, extension);
                resetForm();
                status.innerText = "✅ Saved!";
            } catch (e) { status.innerText = "❌ Error: " + e.message; }
        }

        function triggerLocalDownload(file, finalId, extension) {
            const url = URL.createObjectURL(file);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${finalId}.${extension}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function resetForm() {
            modelInput.value = ""; codeInput.value = ""; idOutput.value = ""; imageInput.value = "";
            superCheckbox.checked = false;
            ["isTH","isColorShifter","isMultipack","isWalmart","isSilver","isPremium","isChase","iLike","iOwn"].forEach(id => document.getElementById(id).checked = false);
            const rows = document.querySelectorAll(".case-row");
            rows.forEach((row, index) => { if (index > 0) row.remove(); });
            modelInput.focus();
        }

        // --- UPDATED SEARCH LOGIC: Searches both Name and Code ---
        document.getElementById("btnSearch").addEventListener("click", async () => {
            const nameQuery = modelInput.value.toLowerCase().trim();
            const codeQuery = codeInput.value.toLowerCase().trim();
            const grid = document.getElementById("admin-results-grid");
            
            if (nameQuery.length < 2 && codeQuery.length < 2) { 
                alert("Enter at least 2 characters in either box to search!"); 
                return; 
            }

            document.getElementById("search-results-admin").style.display = "block";
            grid.innerHTML = "Searching...";

            try {
                const querySnapshot = await getDocs(collection(db, "mainline-cars"));
                const matches = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))
                    .filter(car => {
                        const matchName = nameQuery && car.Model.toLowerCase().includes(nameQuery);
                        const matchCode = codeQuery && car.ModelCode && car.ModelCode.toLowerCase().includes(codeQuery);
                        return matchName || matchCode;
                    });

                grid.innerHTML = matches.length ? "" : "No matches found.";
                matches.forEach(car => {
                    const row = document.createElement("div");
                    row.style = "display: flex; gap: 10px; align-items: center; background: white; padding: 5px; border-radius: 5px; border: 1px solid #eee; cursor: pointer;";
                    row.onclick = () => window.loadCarForEdit(car);
                    row.innerHTML = `
                        <img src="Cars/${car.id}.${car.ImageExt || 'jpg'}" onerror="this.src='https://github.com/maniko-games/website/blob/main/Images/sth.webp?raw=true'" style="height: 50px; width: 50px; object-fit: contain;">
                        <div style="font-size: 0.8em; text-align: left;">
                            <strong style="color: #2196F3;">${car.ModelCode || 'No Code'}</strong><br>
                            <span>${car.Model}</span>
                        </div>`;
                    grid.appendChild(row);
                });
            } catch (e) { grid.innerHTML = "Error searching."; }
        });

        // Search on Enter in either field
        [modelInput, codeInput].forEach(inp => {
            inp.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    document.getElementById("btnSearch").click();
                }
            });
        });

        window.loadCarForEdit = async function(data) {
            isEditMode = true;
            modelInput.value = data.Model || "";
            codeInput.value = data.ModelCode || "";
            idOutput.value = data.id;
            document.getElementById('collector-num').value = data.CollectorNumber || "";
            document.getElementById('series-num').value = data.SeriesNumber || "";
            superCheckbox.checked = !!data["Super TH"];
            document.getElementById("isTH").checked = !!data["TH"];
            document.getElementById("isColorShifter").checked = !!data["Color Shifter"];
            document.getElementById("isMultipack").checked = !!data["Multipack Exclusive"];
            document.getElementById("isWalmart").checked = !!data["Walmart Exclusive"];
            document.getElementById("isSilver").checked = !!data["Silver Series"];
            document.getElementById("isPremium").checked = !!data["Premium"];
            document.getElementById("isChase").checked = !!data["Chase"];
            
            if (data.Year) {
                const yearId = typeof data.Year === 'string' ? data.Year.split('/').pop() : data.Year.id;
                document.getElementById('year-select').value = yearId;
                document.getElementById('year-select').dispatchEvent(new Event('change'));
            }
            setTimeout(() => { if (data.Series) document.getElementById('series-select').value = (typeof data.Series === 'string' ? data.Series.split('/').pop() : data.Series.id); }, 200);

            const caseContainer = document.getElementById("case-container");
            caseContainer.innerHTML = '<label style="font-size: 0.8em; color: #666;">Select Case(s):</label>';
            (Array.isArray(data.Case) ? data.Case : [data.Case]).forEach(c => caseContainer.appendChild(createCaseRow(c)));

            document.getElementById("btnSave").innerText = "Update Existing Car 💾";
            document.getElementById("btnSave").style.background = "#FF9800";
            document.getElementById("search-results-admin").style.display = "none";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        function createCaseRow(val = "") {
            const year = document.getElementById('year-select').value || "2026";
            const row = document.createElement("div");
            row.className = "case-row";
            row.style = "display: flex; gap: 5px; margin-bottom: 5px;";
            const opts = CASE_LETTERS.map(l => { const f = `${l} - ${year}`; return `<option value="${f}" ${f === val ? 'selected' : ''}>${f}</option>`; }).join('');
            row.innerHTML = `<select class="case-select" style="padding: 8px; flex-grow: 1;"><option value="">-- Case --</option>${opts}</select>`;
            return row;
        }

        let allSeries = [];
        async function populateDropdowns() {
            const yearsSnap = await getDocs(collection(db, "years"));
            const yearSelect = document.getElementById('year-select');
            yearsSnap.forEach(d => { yearSelect.innerHTML += `<option value="${d.id}">${d.id}</option>`; });
            yearSelect.value = "2026";
            const seriesSnap = await getDocs(collection(db, "series"));
            allSeries = seriesSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            yearSelect.dispatchEvent(new Event('change'));
            if (!isEditMode) caseContainer.appendChild(createCaseRow());
        }

        document.getElementById('year-select').onchange = function() {
            const y = this.value;
            document.querySelectorAll(".case-select").forEach(s => {
                const l = s.value ? s.value.split(' - ')[0] : "";
                s.innerHTML = `<option value="">-- Case --</option>` + CASE_LETTERS.map(le => `<option value="${le} - ${y}">${le} - ${y}</option>`).join('');
                if (l) s.value = `${l} - ${y}`;
            });
            const ss = document.getElementById('series-select');
            ss.innerHTML = '<option value="">-- Series --</option>';
            allSeries.filter(s => s.Year && s.Year.id === y).forEach(s => { ss.innerHTML += `<option value="${s.id}">${s.Name}</option>`; });
        };

        document.getElementById("btnAddCase").onclick = () => { caseContainer.appendChild(createCaseRow()); };
        populateDropdowns();
    </script>
</body>
</html>
