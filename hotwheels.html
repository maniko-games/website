<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google-adsense-account" content="ca-pub-5489037558570680">
    <title>Maniko Hot Wheels Database</title>
</head>
<body style="font-family: sans-serif; text-align: center; padding: 20px; background-color: #f9f9f9;">

    <div style="display: flex; justify-content: center; gap: 100px; margin: 20px 0; padding: 10px; background: white; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
        <a href="treasures.html?type=STH" style="text-decoration: none; text-align: center;">
            <img src="https://github.com/maniko-games/website/blob/main/Images/sth.webp?raw=true" alt="STH" style="height: 200px; display: block; margin: auto;">
            <span style="font-size: 0.8em; color: #666; font-weight: bold;">Super T-Hunts</span>
        </a>
        <a href="treasures.html?type=TH" style="text-decoration: none; text-align: center;">
            <img src="https://github.com/maniko-games/website/blob/main/Images/th.png?raw=true" alt="TH" style="height: 200px; display: block; margin: auto;">
            <span style="font-size: 0.8em; color: #666; font-weight: bold;">Treasure Hunts</span>
        </a>
    </div>

    <h1>Hot Wheels Collection</h1>

    <div id="cars-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px;">
        <p id="loading-text">Loading collection...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getStorage, ref, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
        import { getFirestore, collection, query, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAkdQrNE0jswL4xfAEM4uHtHyzPwn2o3bU",
            authDomain: "maniko-hotwheels.firebaseapp.com",
            projectId: "maniko-hotwheels",
            storageBucket: "maniko-hotwheels.firebasestorage.app",
            messagingSenderId: "534387805003",
            appId: "1:534387805003:web:9b78747f3538b58194b6ce",
            measurementId: "G-V3WYKC0X1Q"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        async function displayAllCars() {
            const grid = document.getElementById("cars-grid");
            grid.innerHTML = "<p>Loading your collection...</p>";

            try {
                const querySnapshot = await getDocs(query(collection(db, "mainline-cars")));
                let allCars = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                // --- Keep your existing Manual Sorting Logic here ---
                allCars.sort((a, b) => {
                    const getFirstCase = (car) => Array.isArray(car.Case) ? car.Case[0] : (car.Case || "");
                    const fullCaseA = getFirstCase(a); const fullCaseB = getFirstCase(b);
                    const yearA = parseInt(fullCaseA.slice(-4)) || 0; const yearB = parseInt(fullCaseB.slice(-4)) || 0;
                    if (yearA !== yearB) return yearB - yearA;
                    if (fullCaseA !== fullCaseB) return fullCaseB.localeCompare(fullCaseA);
                    if (b["Super TH"] !== a["Super TH"]) return b["Super TH"] - a["Super TH"];
                    if (b["TH"] !== a["TH"]) return b["TH"] - a["TH"];
                    return a.Model.localeCompare(b.Model);
                });

                grid.innerHTML = ""; 

                // Start all card processing at once
                const cardPromises = allCars.map(async (carData) => {
                    const carId = carData.id;
                    const carCard = document.createElement("div");
                    carCard.style = "background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center;";
                    
                    // Build the card structure immediately with a placeholder
                    carCard.innerHTML = `
                        <div style="width: 100%; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; overflow: hidden; background-color: #eee; border-radius: 8px; margin-bottom: 10px;">
                            <img id="img-${carId}" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII="
                                style="max-width: 100%; max-height: 100%; object-fit: contain; opacity: 0; transition: opacity 0.3s ease;">
                        </div>
                        <h3 style="margin: 5px 0;">${carData.Model}</h3>
                        <p style="color: #666; margin: 5px 0;"><strong>Case:</strong> ${
                            (Array.isArray(carData.Case) ? carData.Case : [carData.Case]).map(c => 
                            `<a href="case.html?name=${encodeURIComponent(c)}" style="color: #2196F3; text-decoration: none;">${c}</a>`).join(', ')
                        }</p>
                        <p style="font-size: 0.9em; font-weight: ${carData["Super TH"] || carData["TH"] ? 'bold' : 'normal'}; 
                        color: ${carData["Super TH"] ? '#e67e22' : (carData["TH"] ? '#95a5a6' : '#666')}; margin: 5px 0;">
                        ${carData["Super TH"] ? 'STH' : (carData["TH"] ? 'TH' : 'Mainline')}
                        </p>
                    `;
                    grid.appendChild(carCard);

                    // Fetch image in the background
                    const ext = carData.ImageExt || "jpg";
                    try {
                        const url = await getDownloadURL(ref(storage, `${carId}.${ext}`));
                        const imgElement = document.getElementById(`img-${carId}`);
                        imgElement.src = url;
                        imgElement.onload = () => imgElement.style.opacity = "1"; // Fade in
                    } catch (err) {
                        console.warn(`Missing image for ${carId}`);
                    }
                });

                // This runs all fetches in parallel
                await Promise.all(cardPromises);

            } catch (error) {
                console.error("Error:", error);
                grid.innerHTML = `<p style="color:red;">Error: ${error.message}</p>`;
            }
        }

        displayAllCars();
    </script>
</body>
</html>
