<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google-adsense-account" content="ca-pub-5489037558570680">
    <title>Maniko Hot Wheels Database</title>
</head>
<body style="font-family: sans-serif; text-align: center; padding: 50px;">

    <div id="car-display">
    <h2 id="car-model">Loading car...</h2>
    <p><strong>Case:</strong> <span id="car-case"></span></p>
    <p><strong>Type:</strong> <span id="car-type"></span></p>
    <p><strong>Favorite?</strong> <span id="car-like"></span></p>
    
    <img id="car-photo" src="" alt="Hot Wheels Photo" style="max-width:300px; display:none; border-radius: 10px; margin-top: 15px;">
</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAkdQrNE0jswL4xfAEM4uHtHyzPwn2o3bU",
            authDomain: "maniko-hotwheels.firebaseapp.com",
            projectId: "maniko-hotwheels",
            storageBucket: "maniko-hotwheels.firebasestorage.app",
            messagingSenderId: "534387805003",
            appId: "1:534387805003:web:9b78747f3538b58194b6ce",
            measurementId: "G-V3WYKC0X1Q"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        async function displayCar(carId) {
            try {
                const docRef = doc(db, "mainline-cars", carId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const carData = docSnap.data();
    
                    // 1. Display String/Text fields
                    document.getElementById("car-model").innerText = carData.Model;
                    document.getElementById("car-case").innerText = carData.Case || "N/A";
                    document.getElementById("car-type").innerText = carData.type || "Mainline";

                    // 2. Display Boolean fields (True/False)
                    // We can use a "Ternary Operator" to show a heart if you like it!
                    const likeStatus = carData["I like?"] === true ? "Yes ❤️" : "No ❌";
                    document.getElementById("car-like").innerText = likeStatus;

                    // 3. Handle your photo (using your existing logic)
                    const imageRef = ref(storage, `${carId}.jpg`);
                    const url = await getDownloadURL(imageRef);
                    const imgElement = document.getElementById("car-photo");
                    imgElement.src = url;
                    imgElement.style.display = "inline-block";
                } else {
                    document.getElementById("car-model").innerText = "Car not found in Database";
                }
            } catch (error) {
                console.error("Error loading car:", error);
                document.getElementById("car-model").innerText = "Error loading data: " + error.message;
            }
        }

        displayCar("noyN3JRLIxjd0xs5YgrS"); 
    </script>
</body>
</html>
