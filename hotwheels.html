<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="google-adsense-account" content="ca-pub-5489037558570680">
    <title>Maniko Hot Wheels Database</title>
</head>
<body style="font-family: sans-serif; text-align: center; padding: 20px; background-color: #f9f9f9;">

    <h1>My Hot Wheels Collection</h1>

    <div id="cars-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px;">
        <p id="loading-text">Loading collection...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getStorage, ref, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
        import { getFirestore, collection, query, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAkdQrNE0jswL4xfAEM4uHtHyzPwn2o3bU",
            authDomain: "maniko-hotwheels.firebaseapp.com",
            projectId: "maniko-hotwheels",
            storageBucket: "maniko-hotwheels.firebasestorage.app",
            messagingSenderId: "534387805003",
            appId: "1:534387805003:web:9b78747f3538b58194b6ce",
            measurementId: "G-V3WYKC0X1Q"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        async function displayAllCars() {
            const grid = document.getElementById("cars-grid");
            grid.innerHTML = "<p>Loading your collection...</p>";

            try {
                const carsRef = collection(db, "mainline-cars");
                
                // 1. Get raw data without orderBy (prevents index issues with arrays)
                const q = query(carsRef);
                const querySnapshot = await getDocs(q);
                
                // 2. Convert Snapshot to a standard Array for sorting
                let allCars = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                // 3. MANUAL SORTING LOGIC
                allCars.sort((a, b) => {
                    // Extract first case for comparison
                    const caseA = Array.isArray(a.Case) ? a.Case[0] : (a.Case || "");
                    const caseB = Array.isArray(b.Case) ? b.Case[0] : (b.Case || "");
                    
                    // Sort Case Descending (2026 before 2024)
                    if (caseA !== caseB) {
                        return caseB.localeCompare(caseA); 
                    }

                    // Sort STH first (True > False)
                    if (b["Super TH"] !== a["Super TH"]) return b["Super TH"] - a["Super TH"];

                    // Sort TH second
                    if (b["TH"] !== a["TH"]) return b["TH"] - a["TH"];

                    // Sort Model Alphabetically
                    return a.Model.localeCompare(b.Model);
                });

                grid.innerHTML = ""; 

                // 4. THE LOOP
                for (const carData of allCars) {
                    const carId = carData.id;

                    let photoUrl = "";
                    try {
                        const imageRef = ref(storage, `${carId}.jpg`);
                        photoUrl = await getDownloadURL(imageRef);
                    } catch (err) {
                        photoUrl = "https://via.placeholder.com/200?text=No+Photo";
                    }

                    let typeLabel = "Mainline";
                    let typeColor = "#666";
                    let isBold = "normal";

                    if (carData["Super TH"] === true) {
                        typeLabel = "STH";
                        typeColor = "#e67e22";
                        isBold = "bold";
                    } else if (carData["TH"] === true) {
                        typeLabel = "TH";
                        typeColor = "#95a5a6";
                        isBold = "bold";
                    }

                    const carCard = document.createElement("div");
                    carCard.style = "background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center;";
                    
                    const cases = Array.isArray(carData.Case) ? carData.Case : [carData.Case];
                    const caseLinks = cases.map(c => {
                        const caseEncoded = encodeURIComponent(c);
                        return `<a href="case.html?name=${caseEncoded}" style="color: #2196F3; text-decoration: none;">${c}</a>`;
                    }).join(', ');
                    
                    carCard.innerHTML = `
                        <div style="width: 100%; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; overflow: hidden; background-color: #eee; border-radius: 8px; margin-bottom: 10px;">
                            <img src="${photoUrl}" style="max-width: 100%; max-height: 100%; object-fit: contain;">
                        </div>
                        <h3 style="margin: 5px 0;">${carData.Model}</h3>
                        <p style="color: #666; margin: 5px 0;"><strong>Case:</strong> ${caseLinks}</p>
                        <p style="font-size: 0.9em; font-weight: ${isBold}; color: ${typeColor}; margin: 5px 0;">${typeLabel}</p>
                    `;

                    grid.appendChild(carCard);
                }
            } catch (error) {
                console.error("Error:", error);
                grid.innerHTML = `<p style="color:red;">Error: ${error.message}</p>`;
            }
        }

        displayAllCars();
    </script>
</body>
</html>
