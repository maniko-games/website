<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://firebasestorage.googleapis.com">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Car Details - Maniko Hot Wheels</title>
    <meta name="description" content="Loading Hot Wheels car details...">
    <meta property="og:title" content="Maniko Hot Wheels Database">
    <meta property="og:description" content="View details and high-res images.">
    <meta property="og:image" content="">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-V3WYKC0X1Q"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-V3WYKC0X1Q');

    <title>Car Details - Maniko Hot Wheels</title>
    <link rel="icon" type="image/png" href="https://github.com/maniko-games/website/blob/main/Images/th.png?raw=true">
</head>

<style>
    /* The Full-Screen Overlay */
    #lightbox {
        display: none;
        position: fixed;
        z-index: 999;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background-color: rgba(0, 0, 0, 0.9);
        justify-content: center;
        align-items: center;
        cursor: zoom-out;
    }

    #lightbox img {
        max-width: 95%;
        max-height: 95%;
        object-fit: contain;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    /* Change cursor on the detail page image to show it's clickable */
    #car-image {
        cursor: zoom-in;
        transition: transform 0.2s ease;
    }
    #car-image:hover {
        transform: scale(1.02);
    }

    /* --- STH Comparison Slider Styles --- */
    .sth-comparison-container {
        position: relative;
        width: 100%; height: 100%;
        overflow: hidden;
        border-radius: 8px; /* Matches frame *;
        cursor: ew-resize; /* East-West resize cursor */
        user-select: none; /* Prevents text selection while dragging */
    }

    .sth-comparison-image {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        object-fit: contain; /* IMPORTANT: Keeps full card visible */;
        display: block;
    }

    /* The 'Dud' (Mainline) image goes in this clipping div */
    .sth-comparison-overlay {
        position: absolute;
        top: 0; left: 0;
        height: 100%; width: 100%; /* Initially 100% */;
        overflow: hidden;
        /* Default position (Dud image clipped, STH visible) */
        clip-path: inset(0 0 0 80%); /* Only show right 20% */;
    }

    /* The central drag handle line */
    .sth-comparison-handle {
        position: absolute;
        top: 0; bottom: 0;
        left: 80%; /* Initial pos (aligns with clip-path) */
        width: 4px;
        background-color: #2196F3; /* Home theme blue */;
        cursor: ew-resize;
        z-index: 10;
        transform: translateX(-50%); /* Center the line */
    }

    /* The handle circle/button */
    .sth-comparison-handle::after {
        content: "⬌"; /* Resizing arrows character */
        color: white; font-weight: bold;
        display: flex; align-items: center; justify-content: center;
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 40px; height: 40px;
        background-color: #2196F3;
        border: 4px solid white;
        border-radius: 50%;
        box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
</style>

<body style="font-family: sans-serif; text-align: center; padding: 20px; background-color: #f9f9f9;">

    <div style="display: flex; gap: 15px; margin-bottom: 20px; align-items: center;">
        <a href="#" onclick="window.history.back(); return false;" 
        style="text-decoration: none; color: #2196F3; font-weight: bold;">
        ← Back
        </a>
        <span style="color: #ccc;">|</span>
        <a href="hotwheels.html" 
        style="text-decoration: none; color: #2196F3; font-weight: bold;">
        Home
        </a>
    </div>

    <div id="details-container" style="max-width: 540px; margin: 0 auto; background: white; border-radius: 15px; padding: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
        
        <div id="loading">Loading details...</div>

        <div id="car-content" style="display: none;">
            <div id="car-image-frame" style="width: 100%; max-width: 500px; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; overflow: hidden; background-color: #eee; border-radius: 15px; margin: 0 auto 20px auto; padding: 20px; border: 1px solid #eee;">
                <img id="car-image" src="" style="max-width: 100%; max-height: 100%; object-fit: contain;">
            </div>
            <h1 id="car-model" style="margin: 10px 0; font-size: 2.5em;"></h1>
            <p id="car-case" style="font-size: 1.2em; color: #666;"></p>
            <div id="car-type" style="font-weight: bold; font-size: 1.5em; margin-top: 15px; padding: 10px; border-radius: 8px;"></div>
        </div>
    </div>
    <div id="treasure-section-outside" style="max-width: 1200px; margin: 40px auto 0 auto;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAkdQrNE0jswL4xfAEM4uHtHyzPwn2o3bU",
            authDomain: "maniko-hotwheels.firebaseapp.com",
            projectId: "maniko-hotwheels",
            storageBucket: "maniko-hotwheels.firebasestorage.app",
            messagingSenderId: "534387805003",
            appId: "1:534387805003:web:9b78747f3538b58194b6ce",
            measurementId: "G-V3WYKC0X1Q"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const urlParams = new URLSearchParams(window.location.search);
        const carId = urlParams.get('id');

        async function loadCarDetails() {
            if (!carId) return;

            try {
                const docRef = doc(db, "mainline-cars", carId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();

                    // --- 1. SEO & Metadata Setup ---
                    document.title = `${data.Model} - Maniko Hot Wheels`;
                    const metaDesc = document.querySelector('meta[name="description"]');
                    if (metaDesc) {
                        metaDesc.content = `Technical details for the ${data.Model} from Hot Wheels Case ${data.Case}.`;
                    }
                    document.querySelector('meta[property="og:title"]').setAttribute("content", data.Model);
                    
                    // Fetch Primary Image URL
                    const ext = data.ImageExt || "jpg";
                    const sthUrl = await getDownloadURL(ref(storage, `${carId}.${ext}`));
                    document.querySelector('meta[property="og:image"]').setAttribute("content", sthUrl);
                    
                    // --- 2. JSON-LD Schema ---
                    const schemaData = {
                        "@context": "https://schema.org/",
                        "@type": "Thing", 
                        "name": data.Model,
                        "image": sthUrl,
                        "description": `Details for the Hot Wheels ${data.Model}. Part of the ${data.Case} collection.`,
                        "mainEntityOfPage": {
                            "@type": "WebPage",
                            "@id": window.location.href
                        },
                        "identifier": carId,
                        "additionalProperty": [
                            { "@type": "PropertyValue", "name": "Case", "value": data.Case },
                            { "@type": "PropertyValue", "name": "Type", "value": data["Super TH"] ? "Super Treasure Hunt" : (data["TH"] ? "Treasure Hunt" : "Mainline") }
                        ]
                    };
                    const schemaScript = document.createElement('script');
                    schemaScript.type = 'application/ld+json';
                    schemaScript.text = JSON.stringify(schemaData);
                    document.head.appendChild(schemaScript);
                    
                    // --- 3. UI Info Setup ---
                    document.getElementById("car-model").innerText = data.Model;
                    
                    const cases = Array.isArray(data.Case) ? data.Case : [data.Case];
                    const caseLinks = cases.map(c => {
                        const caseEncoded = encodeURIComponent(c);
                        return `<a href="case.html?name=${caseEncoded}" style="color: #2196F3; text-decoration: none; border-bottom: 1px dashed #2196F3;">${c}</a>`;
                    }).join(', ');
                    document.getElementById("car-case").innerHTML = "<strong>Case:</strong> " + caseLinks;
                    
                    const typeDiv = document.getElementById("car-type");
                    if (data["Super TH"]) {
                        typeDiv.innerText = "SUPER TREASURE HUNT 🔥";
                        typeDiv.style.color = "#e67e22";
                        typeDiv.style.backgroundColor = "#fff5e6";
                    } else if (data["TH"]) {
                        typeDiv.innerText = "TREASURE HUNT 💎";
                        typeDiv.style.color = "#95a5a6";
                        typeDiv.style.backgroundColor = "#f2f2f2";
                    } else {
                        typeDiv.innerText = "Mainline";
                        typeDiv.style.color = "#666";
                        typeDiv.style.backgroundColor = "transparent";
                    }

                    // --- 4. Image & STH Comparison Logic ---
                    const frame = document.getElementById("car-image-frame");
                    let dudFound = false;
                    let dudUrl;

                    if (data["Super TH"]) {
                        try {
                            const carsRef = collection(db, "mainline-cars");
                            const dudQuery = query(carsRef, where("Model", "==", data.Model), where("Super TH", "==", false));
                            const dudSnap = await getDocs(dudQuery);

                            if (!dudSnap.empty) {
                                dudFound = true;
                                const dudData = dudSnap.docs[0].data();
                                const dudId = dudSnap.docs[0].id;
                                const dudExt = dudData.ImageExt || "jpg";
                                dudUrl = await getDownloadURL(ref(storage, `${dudId}.${dudExt}`));
                            }
                        } catch (e) { console.warn("Error searching for dud", e); }
                    }

                    if (dudFound) {
                        frame.innerHTML = `
                            <div class="sth-comparison-container" id="comparison-slider">
                                <img src="${sthUrl}" class="sth-comparison-image" alt="${data.Model} STH">
                                <div class="sth-comparison-overlay" id="comparison-overlay">
                                    <img src="${dudUrl}" class="sth-comparison-image" alt="${data.Model} Mainline">
                                </div>
                                <div class="sth-comparison-handle" id="comparison-handle"></div>
                            </div>
                        `;
                        activateSlider();
                        frame.style.cursor = "default";
                    } else {
                        frame.innerHTML = `<img id="car-image" src="${sthUrl}" alt="${data.Model}" style="max-width: 100%; max-height: 100%; object-fit: contain;">`;
                        const carImg = document.getElementById("car-image");
                        const lightbox = document.getElementById("lightbox");
                        const lightboxImg = document.getElementById("lightbox-img");
                        carImg.onclick = () => {
                            lightboxImg.src = carImg.src;
                            lightbox.style.display = 'flex';
                        };
                        carImg.style.cursor = "zoom-in";
                    }

                    // --- 5. "Found With" & "Variants" Sections ---
                    const treasureSection = document.getElementById("treasure-section-outside");
                    treasureSection.innerHTML = ""; // Clear loader

                    const carsRef = collection(db, "mainline-cars");
                    const foundTreasures = new Map();

                    for (const caseName of cases) {
                        const qString = query(carsRef, where("Case", "==", caseName));
                        const qArray = query(carsRef, where("Case", "array-contains", caseName));
                        const [snapString, snapArray] = await Promise.all([getDocs(qString), getDocs(qArray)]);

                        [...snapString.docs, ...snapArray.docs].forEach(doc => {
                            const d = doc.data();
                            if ((d["Super TH"] || d["TH"]) && doc.id !== carId) {
                                foundTreasures.set(doc.id, d);
                            }
                        });
                    }

                    if (foundTreasures.size > 0) {
                        const tWrapper = document.createElement("div");
                        tWrapper.innerHTML = `<h2 style="margin-top:30px;">Can be found with:</h2><div id="treasures-found" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 250px)); gap: 20px; justify-content: center; padding: 20px;"></div>`;
                        treasureSection.appendChild(tWrapper);
                        const tGrid = document.getElementById("treasures-found");

                        const treasureList = Array.from(foundTreasures, ([id, data]) => ({ id, ...data }));
                        treasureList.sort((a, b) => (b["Super TH"] ? 1 : -1) || a.Model.localeCompare(b.Model));

                        treasureList.forEach(async (tData) => {
                            const tId = tData.id;
                            const tCard = document.createElement("a");
                            tCard.href = `carinfo.html?id=${tId}`;
                            tCard.className = "treasure-card"; // Add your styles or use inline
                            tCard.style = "text-decoration: none; color: #333; background: white; border: 1px solid #eee; border-radius: 15px; padding: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05);";
                            
                            tCard.innerHTML = `
                                <div style="width: 100%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; background: #eee; border-radius: 8px; overflow: hidden; margin-bottom: 10px;">
                                    <img id="t-img-${tId}" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" loading="lazy" style="max-width: 100%; max-height: 100%; object-fit: contain; opacity: 0; transition: opacity 0.3s;">
                                </div>
                                <div style="font-weight: bold; font-size: 0.9em;">${tData.Model}</div>
                                <p style="font-size: 0.8em; font-weight: bold; color: ${tData["Super TH"] ? '#e67e22' : '#95a5a6'}; margin: 5px 0;">${tData["Super TH"] ? 'STH' : 'TH'}</p>
                            `;
                            tGrid.appendChild(tCard);

                            const tExt = tData.ImageExt || "jpg";
                            const tUrl = await getDownloadURL(ref(storage, `${tId}.${tExt}`));
                            const tImg = document.getElementById(`t-img-${tId}`);
                            if (tImg) { tImg.src = tUrl; tImg.onload = () => tImg.style.opacity = "1"; }
                        });
                    }

                    // Variants logic...
                    const variantsQuery = query(carsRef, where("Model", "==", data.Model));
                    const variantsSnap = await getDocs(variantsQuery);
                    const variants = variantsSnap.docs.filter(doc => doc.id !== carId);

                    if (variants.length > 0) {
                        const vWrapper = document.createElement("div");
                        vWrapper.innerHTML = `<h2 style="margin-top:40px;">Other variants of this model:</h2><div id="variants-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 250px)); gap: 20px; justify-content: center; padding: 20px;"></div>`;
                        treasureSection.appendChild(vWrapper);
                        const vGrid = document.getElementById("variants-grid");

                        variants.forEach(async (vDoc) => {
                            const vData = vDoc.data();
                            const vId = vDoc.id;
                            const vCard = document.createElement("a");
                            vCard.href = `carinfo.html?id=${vId}`;
                            vCard.style = "text-decoration: none; color: #333; background: white; border: 1px solid #eee; border-radius: 12px; padding: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05);";
                            
                            vCard.innerHTML = `
                                <div style="width: 100%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; background: #eee; border-radius: 8px; overflow: hidden; margin-bottom: 10px;">
                                    <img id="v-img-${vId}" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" loading="lazy" style="max-width: 100%; max-height: 100%; object-fit: contain; opacity: 0; transition: opacity 0.3s;">
                                </div>
                                <div style="font-weight: bold; font-size: 0.9em;">${vData.Model}</div>
                                <p style="font-size: 0.8em; font-weight: bold; color: #666; margin: 5px 0;">${vData["Super TH"] ? 'STH' : (vData["TH"] ? 'TH' : 'Mainline')}</p>
                            `;
                            vGrid.appendChild(vCard);

                            const vExt = vData.ImageExt || "jpg";
                            const vUrl = await getDownloadURL(ref(storage, `${vId}.${vExt}`));
                            const vImg = document.getElementById(`v-img-${vId}`);
                            if (vImg) { vImg.src = vUrl; vImg.onload = () => vImg.style.opacity = "1"; }
                        });
                    }

                    document.getElementById("loading").style.display = "none";
                    document.getElementById("car-content").style.display = "block";

                } else {
                    document.getElementById("loading").innerText = "Car not found!";
                }
            } catch (e) {
                console.error(e);
                document.getElementById("loading").innerText = "Error loading details.";
            }
        }

        function activateSlider() {
            const slider = document.getElementById('comparison-slider');
            const overlay = document.getElementById('comparison-overlay');
            const handle = document.getElementById('comparison-handle');
            if (!slider || !overlay || !handle) return;
            let isDragging = false;
            function move(xPerc) {
                handle.style.left = xPerc;
                overlay.style.clipPath = `inset(0 0 0 ${xPerc})`;
            }
            function handleMove(e) {
                if (!isDragging) return;
                let rect = slider.getBoundingClientRect();
                let x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
                let perc = ((x - rect.left) / rect.width) * 100;
                if (perc < 5) perc = 5; if (perc > 95) perc = 95;
                move(perc + '%');
            }
            handle.addEventListener('mousedown', () => isDragging = true);
            handle.addEventListener('touchstart', () => isDragging = true);
            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('touchend', () => isDragging = false);
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('touchmove', handleMove);
        }

        loadCarDetails();
    </script>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="">
    </div>
</body>
</html>
