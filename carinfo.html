<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Details - Maniko Hot Wheels</title>
</head>

<style>
    /* The Full-Screen Overlay */
    #lightbox {
        display: none;
        position: fixed;
        z-index: 999;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background-color: rgba(0, 0, 0, 0.9);
        justify-content: center;
        align-items: center;
        cursor: zoom-out;
    }

    #lightbox img {
        max-width: 95%;
        max-height: 95%;
        object-fit: contain;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    /* Change cursor on the detail page image to show it's clickable */
    #car-image {
        cursor: zoom-in;
        transition: transform 0.2s ease;
    }
    #car-image:hover {
        transform: scale(1.02);
    }

    /* --- STH Comparison Slider Styles --- */
    .sth-comparison-container {
        position: relative;
        width: 100%; height: 100%;
        overflow: hidden;
        border-radius: 8px; /* Matches frame *;
        cursor: ew-resize; /* East-West resize cursor */
        user-select: none; /* Prevents text selection while dragging */
    }

    .sth-comparison-image {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        object-fit: contain; /* IMPORTANT: Keeps full card visible */;
        display: block;
    }

    /* The 'Dud' (Mainline) image goes in this clipping div */
    .sth-comparison-overlay {
        position: absolute;
        top: 0; left: 0;
        height: 100%; width: 100%; /* Initially 100% */;
        overflow: hidden;
        /* Default position (Dud image clipped, STH visible) */
        clip-path: inset(0 0 0 80%); /* Only show right 20% */;
    }

    /* The central drag handle line */
    .sth-comparison-handle {
        position: absolute;
        top: 0; bottom: 0;
        left: 80%; /* Initial pos (aligns with clip-path) */
        width: 4px;
        background-color: #2196F3; /* Home theme blue *;
        cursor: ew-resize;
        z-index: 10;
        transform: translateX(-50%); /* Center the line */
    }

    /* The handle circle/button */
    .sth-comparison-handle::after {
        content: "⬌"; /* Resizing arrows character */
        color: white; font-weight: bold;
        display: flex; align-items: center; justify-content: center;
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 40px; height: 40px;
        background-color: #2196F3;
        border: 4px solid white;
        border-radius: 50%;
        box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
</style>

<body style="font-family: sans-serif; text-align: center; padding: 20px; background-color: #f9f9f9;">

    <div style="display: flex; gap: 15px; margin-bottom: 20px; align-items: center;">
        <a href="#" onclick="window.history.back(); return false;" 
        style="text-decoration: none; color: #2196F3; font-weight: bold;">
        ← Back
        </a>
        <span style="color: #ccc;">|</span>
        <a href="hotwheels.html" 
        style="text-decoration: none; color: #2196F3; font-weight: bold;">
        Home
        </a>
    </div>

    <div id="details-container" style="max-width: 540px; margin: 0 auto; background: white; border-radius: 15px; padding: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
        
        <div id="loading">Loading details...</div>

        <div id="car-content" style="display: none;">
            <div id="car-image-frame" style="width: 100%; max-width: 500px; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; overflow: hidden; background-color: #eee; border-radius: 15px; margin: 0 auto 20px auto; padding: 20px; border: 1px solid #eee;">
                <img id="car-image" src="" style="max-width: 100%; max-height: 100%; object-fit: contain;">
            </div>
            <h1 id="car-model" style="margin: 10px 0; font-size: 2.5em;"></h1>
            <p id="car-case" style="font-size: 1.2em; color: #666;"></p>
            <div id="car-type" style="font-weight: bold; font-size: 1.5em; margin-top: 15px; padding: 10px; border-radius: 8px;"></div>
        </div>
    </div>
    <div id="treasure-section-outside" style="max-width: 1200px; margin: 40px auto 0 auto;"></div>

    <script type="module">
        // 1. Added missing imports: collection, query, where, getDocs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAkdQrNE0jswL4xfAEM4uHtHyzPwn2o3bU",
            authDomain: "maniko-hotwheels.firebaseapp.com",
            projectId: "maniko-hotwheels",
            storageBucket: "maniko-hotwheels.firebasestorage.app",
            messagingSenderId: "534387805003",
            appId: "1:534387805003:web:9b78747f3538b58194b6ce",
            measurementId: "G-V3WYKC0X1Q"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const urlParams = new URLSearchParams(window.location.search);
        const carId = urlParams.get('id');

        async function loadCarDetails() {
            if (!carId) return;

            try {
                const docRef = doc(db, "mainline-cars", carId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // --- Basic Info Setup ---
                    document.getElementById("car-model").innerText = data.Model;
                    
                    const cases = Array.isArray(data.Case) ? data.Case : [data.Case];
                    const caseLinks = cases.map(c => {
                        const caseEncoded = encodeURIComponent(c);
                        return `<a href="case.html?name=${caseEncoded}" style="color: #2196F3; text-decoration: none; border-bottom: 1px dashed #2196F3;">${c}</a>`;
                    }).join(', ');

                    document.getElementById("car-case").innerHTML = "<strong>Case:</strong> " + caseLinks;
                    
                    const typeDiv = document.getElementById("car-type");
                    if (data["Super TH"]) {
                        typeDiv.innerText = "SUPER TREASURE HUNT 🔥";
                        typeDiv.style.color = "#e67e22";
                        typeDiv.style.backgroundColor = "#fff5e6";
                    } else if (data["TH"]) {
                        typeDiv.innerText = "TREASURE HUNT 💎";
                        typeDiv.style.color = "#95a5a6";
                        typeDiv.style.backgroundColor = "#f2f2f2";
                    } else {
                        typeDiv.innerText = "Mainline";
                        typeDiv.style.color = "#666";
                    }

                    // --- 3. Image & STH Comparison Logic ---
                    const frame = document.getElementById("car-image-frame");
                    let dudFound = false;
                    let sthUrl, dudUrl;

                    // FIX: Define ext here before fetching the URL
                    const ext = data.ImageExt || "jpg";

                    // A. Fetch current STH image
                    sthUrl = await getDownloadURL(ref(storage, `${carId}.${ext}`));

                    // B. IF CURRENT CAR IS STH, Search for Dud counterpart
                    if (data["Super TH"]) {
                        try {
                            // We need to define carsRef before searching (it's defined later in your original script)
                            const carsRef = collection(db, "mainline-cars");
                            const dudQuery = query(carsRef, where("Model", "==", data.Model), where("Super TH", "==", false));
                            const dudSnap = await getDocs(dudQuery);

                            if (!dudSnap.empty) {
                                dudFound = true;
                                const dudData = dudSnap.docs[0].data();
                                const dudId = dudSnap.docs[0].id;
                                const dudExt = dudData.ImageExt || "jpg";
                                dudUrl = await getDownloadURL(ref(storage, `${dudId}.${dudExt}`));
                            }
                        } catch (e) { console.warn("Error searching for dud", e); }
                    }

                    // C. Render UI based on what we found
                    if (dudFound) {
                        // --- BUILD COMPARISON SLIDER (STH on left, Dud on right) ---
                        frame.innerHTML = `
                            <div class="sth-comparison-container" id="comparison-slider">
                                <img src="${sthUrl}" class="sth-comparison-image" alt="STH Version">
                                
                                <div class="sth-comparison-overlay" id="comparison-overlay">
                                    <img src="${dudUrl}" class="sth-comparison-image" alt="Dud Version">
                                </div>
                                
                                <div class="sth-comparison-handle" id="comparison-handle"></div>
                            </div>
                        `;

                        // D. ACTIVATE SLIDER JAVASCRIPT
                        activateSlider();

                        // E. Update cursor for frame (no lightbox on comparison)
                        frame.style.cursor = "default";

                    } else {
                        // --- STANDARD SINGLE IMAGE VIEW (No dud found or not STH) ---
                        frame.innerHTML = `<img id="car-image" src="${sthUrl}" style="max-width: 100%; max-height: 100%; object-fit: contain;">`;
                        
                        const carImg = document.getElementById("car-image");

                        // F. ACTIVATE LIGHTBOX (Standard view only)
                        const lightbox = document.getElementById("lightbox");
                        const lightboxImg = document.getElementById("lightbox-img");
                        carImg.onclick = () => {
                            lightboxImg.src = carImg.src;
                            lightbox.style.display = 'flex';
                        };
                        
                        // Apply cursor style to single image
                        carImg.style.cursor = "zoom-in";
                    }

                    // --- Treasure Search Logic (Moved inside here) ---
                    const treasureContainer = document.createElement("div");
                    treasureContainer.innerHTML = `
                    <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
                        <h3 style="margin-top:30px; text-align: center;">Can be found with:</h3>
                        <div id="treasures-found" style="width: 100%;"></div>
                    </div>`;
                    document.getElementById("treasure-section-outside").appendChild(treasureContainer);
                    const treasuresGrid = document.getElementById("treasures-found");
                    treasuresGrid.innerHTML = "";

                    const carsRef = collection(db, "mainline-cars");
                    const foundTreasures = new Map();

                    for (const caseName of cases) {
                        const qString = query(carsRef, where("Case", "==", caseName));
                        const qArray = query(carsRef, where("Case", "array-contains", caseName));

                        const [snapString, snapArray] = await Promise.all([getDocs(qString), getDocs(qArray)]);

                        [...snapString.docs, ...snapArray.docs].forEach(doc => {
                            const d = doc.data();
                            // Add if it's a treasure and NOT the current car
                            if ((d["Super TH"] || d["TH"]) && doc.id !== carId) {
                                foundTreasures.set(doc.id, d);
                            }
                        });
                    }

                    // 4. Display the results
                    if (foundTreasures.size === 0) {
                        treasuresGrid.innerHTML = "<p style='color:#999;'>No other treasures in these cases.</p>";
                    } else {
                        // Change these lines in your script:
                        treasuresGrid.style.display = "grid";

                        // 1. Use 'auto-fit' instead of 'auto-fill'
                        treasuresGrid.style.gridTemplateColumns = "repeat(auto-fit, minmax(200px, 250px))";

                        // 2. Add a max-width and margin auto to the grid itself
                        treasuresGrid.style.width = "100%";
                        treasuresGrid.style.maxWidth = "100%";
                        treasuresGrid.style.margin = "0 auto";

                        // 3. Keep the justify-content
                        treasuresGrid.style.justifyContent = "center";
                        treasuresGrid.style.gap = "20px";
                        treasuresGrid.style.padding = "20px 0";

                        // A. Convert Map to an Array so we can sort it
                        const treasureList = Array.from(foundTreasures, ([id, data]) => ({ id, ...data }));

                        // B. Sort: STH (True) comes before TH (False)
                        treasureList.sort((a, b) => {
                            // If one is STH and the other isn't, STH stays on top
                            if (b["Super TH"] !== a["Super TH"]) {
                                return b["Super TH"] ? 1 : -1;
                            }
                            // If they are the same type, sort alphabetically by Model
                            return a.Model.localeCompare(b.Model);
                        });

                        // C. Loop through the SORTED list
                        treasureList.forEach(async (tData) => {
                            const tId = tData.id;
                            const tLabel = tData["Super TH"] ? "STH" : "TH";
                            const tColor = tData["Super TH"] ? "#e67e22" : "#95a5a6";
                            
                            const tCard = document.createElement("a");
                            tCard.href = `carinfo.html?id=${tId}`;
                            tCard.style = "text-decoration: none; color: #333; background: white; border: 1px solid #eee; border-radius: 15px; padding: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: transform 0.2s;";
                            
                            // --- Case Link Logic ---
                            const cases = Array.isArray(tData.Case) ? tData.Case : [tData.Case];
                            const caseLinks = cases.map(c => {
                                const caseEncoded = encodeURIComponent(c);
                                // We use stopPropagation so clicking the Case doesn't open the Car Info too
                                return `<span style="color: #2196F3; text-decoration: underline; cursor: pointer;" 
                                            onclick="event.preventDefault(); event.stopPropagation(); window.location.href='case.html?name=${caseEncoded}'">${c}</span>`;
                            }).join(', ');

                            tCard.innerHTML = `
                                <div style="width: 100%; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; overflow: hidden; background-color: #eee; border-radius: 8px; margin-bottom: 12px;">
                                    <img id="t-img-${tId}" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" 
                                        style="max-width: 100%; max-height: 100%; object-fit: contain; opacity: 0; transition: opacity 0.3s;">
                                </div>
                                <div style="margin: 5px 0; font-weight: bold; font-size: 1em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${tData.Model}</div>
                                <div style="font-size: 0.85em; color: #666; margin-bottom: 5px;">Case: ${caseLinks}</div>                                
                                <p style="font-size: 0.9em; font-weight: bold; color: ${tColor}; margin: 2px 0;">${tLabel}</p>
                            `;
                            treasuresGrid.appendChild(tCard);

                            // Fetch the high-res image
                            try {
                                const tExt = tData.ImageExt || "jpg";
                                const tUrl = await getDownloadURL(ref(storage, `${tId}.${tExt}`));
                                const tImg = document.getElementById(`t-img-${tId}`);
                                if (tImg) {
                                    tImg.src = tUrl;
                                    tImg.onload = () => tImg.style.opacity = "1";
                                }
                            } catch (e) {
                                console.warn("Could not load treasure image", tId);
                            }
                        });
                    }

                    // Show content
                    document.getElementById("loading").style.display = "none";
                    document.getElementById("car-content").style.display = "block";

                    // 5a. Search for Variants in the database
                    const variantsGridId = "variants-grid"; // ID for our grid below
                    const variantsQuery = query(carsRef, where("Model", "==", data.Model));
                    const variantsSnap = await getDocs(variantsQuery);

                    const otherVariants = [];
                    variantsSnap.forEach(doc => {
                        // Only add if it's NOT the car we are currently looking at
                        if (doc.id !== carId) {
                            otherVariants.push({ id: doc.id, ...doc.data() });
                        }
                    });

                    // 5b. Only draw the section if variants actually exist
                    if (otherVariants.length > 0) {
                        const variantsWrapper = document.createElement("div");
                        variantsWrapper.id = "variants-section-wrapper";
                        // Centering the container (width: 100% and text-align)
                        variantsWrapper.style = "display: flex; flex-direction: column; align-items: center; width: 100%; text-align: center; margin-top: 40px;";
                        
                        // The Section HTML
                        variantsWrapper.innerHTML = `
                            <h3 style="margin-bottom: 20px;">Other variants of this model:</h3>
                            <div id="${variantsGridId}"></div>
                        `;

                        document.getElementById("treasure-section-outside").appendChild(variantsWrapper);

                        const variantsGrid = document.getElementById(variantsGridId);

                        // Grid Styling: Changed auto-fill to auto-fit to enable centering
                        variantsGrid.style.display = "grid";
                        variantsGrid.style.gridTemplateColumns = "repeat(auto-fit, minmax(200px, 250px))";
                        variantsGrid.style.justifyContent = "center"; // Active because of auto-fit
                        variantsGrid.style.width = "100%";
                        variantsGrid.style.maxWidth = "1200px"; // Matches the standard page width
                        variantsGrid.style.gap = "20px";
                        variantsGrid.style.padding = "20px 0";

                        // Draw the Variant Cards
                        otherVariants.forEach(async (vData) => {
                            const vId = vData.id;
                            const vLabel = vData["Super TH"] ? "STH" : (vData["TH"] ? "TH" : "Mainline");
                            const vColor = vData["Super TH"] ? "#e67e22" : (vData["TH"] ? "#95a5a6" : "#666");

                            const vCard = document.createElement("a");
                            vCard.href = `carinfo.html?id=${vId}`;
                            vCard.style = "text-decoration: none; color: #333; background: white; border: 1px solid #eee; border-radius: 12px; padding: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: transform 0.2s;";
                            
                            // --- Case Link Logic (Same as Treasures) ---
                            const vCases = Array.isArray(vData.Case) ? vData.Case : [vData.Case];
                            const vCaseLinks = vCases.map(c => {
                                const caseEncoded = encodeURIComponent(c);
                                return `<span style="color: #2196F3; text-decoration: underline; cursor: pointer;" 
                                            onclick="event.preventDefault(); event.stopPropagation(); window.location.href='case.html?name=${caseEncoded}'">${c}</span>`;
                            }).join(', ');

                            vCard.innerHTML = `
                                <div style="width: 100%; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; overflow: hidden; background-color: #eee; border-radius: 8px; margin-bottom: 12px;">
                                    <img id="v-img-${vId}" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII="
                                        style="max-width: 100%; max-height: 100%; object-fit: contain; opacity: 0; transition: opacity 0.3s;">
                                </div>
                                <div style="margin: 5px 0; font-weight: bold; font-size: 1.05em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${vData.Model}</div>
                                <div style="font-size: 0.85em; color: #666; margin-bottom: 5px;">Case: ${vCaseLinks}</div>
                                <p style="font-size: 0.9em; font-weight: bold; color: ${vColor}; margin: 2px 0;">${vLabel}</p>
                            `;
                            variantsGrid.appendChild(vCard);

                            // Fetch the image
                            try {
                                const vExt = vData.ImageExt || "jpg";
                                const vUrl = await getDownloadURL(ref(storage, `${vId}.${vExt}`));
                                const vImg = document.getElementById(`v-img-${vId}`);
                                if (vImg) {
                                    vImg.src = vUrl;
                                    vImg.onload = () => vImg.style.opacity = "1";
                                }
                            } catch (e) { console.warn("Missing image", vId); }
                        });
                    }

                } else {
                    document.getElementById("loading").innerText = "Car not found!";
                }
            } catch (e) {
                console.error(e);
                document.getElementById("loading").innerText = "Error loading details.";
            }
        }

        // --- Function to handle comparison slider dragging ---
        function activateSlider() {
            const slider = document.getElementById('comparison-slider');
            const overlay = document.getElementById('comparison-overlay');
            const handle = document.getElementById('comparison-handle');

            if (!slider || !overlay || !handle) return;

            let isDragging = false;

            // Helper: move the slider to 'x' position (percentage string)
            function move(xPerc) {
                handle.style.left = xPerc;
                overlay.style.clipPath = `inset(0 0 0 ${xPerc})`; // Clip left side of Dud image
            }

            // Main interaction logic
            function handleMove(e) {
                if (!isDragging) return;

                let rect = slider.getBoundingClientRect();
                let x = e.clientX || e.touches[0].clientX; // Handles Mouse or Touch

                // Calculate x position relative to the slider
                let pos = x - rect.left;
                let perc = (pos / rect.width) * 100;

                // Constraints: Keep within 5% to 95% boundaries
                if (perc < 5) perc = 5;
                if (perc > 95) perc = 95;

                // Apply new position
                move(perc + '%');
            }

            // START (Mouse & Touch)
            handle.addEventListener('mousedown', (e) => { isDragging = true; e.preventDefault(); });
            handle.addEventListener('touchstart', (e) => { isDragging = true; });

            // STOP (Mouse & Touch, anywhere on window)
            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('touchend', () => isDragging = false);

            // MOVE (Mouse & Touch, anywhere on window for smooth dragging)
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('touchmove', handleMove);
        }

        loadCarDetails();
    </script>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="">
    </div>
</body>
</html>
