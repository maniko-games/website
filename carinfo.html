<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://firebasestorage.googleapis.com">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Car Details - Maniko Hot Wheels</title>
    <meta name="description" content="Loading Hot Wheels car details...">
    <meta property="og:title" content="Maniko Hot Wheels Database">
    <meta property="og:description" content="View details and high-res images.">
    <meta property="og:image" content="">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-V3WYKC0X1Q"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-V3WYKC0X1Q');

    <title>Car Details - Maniko Hot Wheels</title>
    <link rel="icon" type="image/png" href="https://github.com/maniko-games/website/blob/main/Images/sth.webp?raw=true">
    <link rel="stylesheet" href="style.css?v=1.1">
</head>

<header class="global-header">
    <div class="header-top">
        <a href="hotwheels.html" class="logo">Maniko HW DB</a>
        <div class="search-container">
            <input type="text" id="global-search" placeholder="Search" oninput="handleGlobalSearch()" autocomplete="off">
            <div id="search-dropdown"></div>
        </div>
    </div>
</header>

<div id="search-overlay" style="display: none; position: fixed; top: 60px; left: 0; width: 100%; height: calc(100% - 60px); background: rgba(249, 249, 249, 0.98); z-index: 999; overflow-y: auto; padding: 20px;">
    <div style="max-width: 800px; margin: 0 auto;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 id="overlay-title" style="margin: 0;">Search Results</h2>
            <button onclick="closeSearch()" style="background: none; border: 1px solid #ccc; padding: 5px 15px; border-radius: 20px; cursor: pointer;">Close ×</button>
        </div>
        <div id="overlay-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px;">
            </div>
    </div>
</div>

<div class="header-spacer"></div>

<body style="font-family: sans-serif; text-align: center; padding: 0 20px 20px 20px; background-color: #f9f9f9;">

    <div id="details-container" style="max-width: 540px; margin: 0 auto; background: white; border-radius: 15px; padding: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
        
        <div id="loading" style="font-style: italic; color: #999; margin-bottom: 10px;">Loading details...</div>

        <div id="car-content">
            <div id="car-image-frame" style="width: 100%; max-width: 500px; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; overflow: hidden; background-color: #eee; border-radius: 15px; margin: 0 auto 20px auto; padding: 20px; border: 1px solid #eee;">
                <img id="car-image" src="" style="max-width: 100%; max-height: 100%; object-fit: contain;">
            </div>
            <h1 id="car-model">---</h1>
            <p id="car-case">Case: ---</p>
            <div id="car-type" style="font-weight: bold; margin-top: 15px; padding: 10px; border-radius: 8px;"></div>
        </div>
    </div>
    <div id="treasure-section-outside" style="max-width: 1200px; margin: 40px auto 0 auto;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { firebaseConfig } from './app.js';

        // 1. Initialize Firebase (The Engine)
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 2. Setup Variables (The Data)
        let cachedCars = [];
        const urlParams = new URLSearchParams(window.location.search);
        const carId = urlParams.get('id');

        // 3. Instant UI Feedback (The "Smart" Title & Placeholder)
        if (carId) {
            const parts = carId.split('-');
            const tempName = parts.slice(0, -2).join(' ').toUpperCase();
            const year = parts[parts.length - 1];
            const caseLetter = parts[parts.length - 2];

            document.title = tempName + " - Maniko HW DB";
            
            // Set placeholders immediately
            document.getElementById("car-model").innerText = tempName;
            document.getElementById("car-case").innerText = `Case: ${caseLetter} - ${year}`;

            // 🔥 NEW: Start the image download IMMEDIATELY
            // We guess the extension is .jpg; if it's .webp, the renderCarDetails will fix it later
            document.getElementById("car-image").src = `Cars/${carId}.jpg`; 
        }

        // --- 1. DATA PRELOAD (PARALLEL FETCHING) ---
        // --- 1. THE PARALLEL ENGINE ---
        async function loadData() {
            if (!carId) return;

            // Start BOTH tasks immediately
            const singleDocPromise = getDoc(doc(db, "mainline-cars", carId));
            const collectionPromise = getDocs(collection(db, "mainline-cars"));

            try {
                // STEP A: Get the specific car data first (FAST)
                const docSnap = await singleDocPromise;
                if (docSnap.exists()) {
                    const currentCarData = { id: docSnap.id, ...docSnap.data() };
                    renderCarDetails(currentCarData); // Show main image & info
                } else {
                    document.getElementById("loading").innerText = "Car not found!";
                    return;
                }

                // STEP B: Wait for the full database (background)
                const querySnapshot = await collectionPromise;
                cachedCars = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                // STEP C: Now that we have the full DB, update Slider and Related Sections
                const data = { id: docSnap.id, ...docSnap.data() };
                const cases = Array.isArray(data.Case) ? data.Case : [data.Case];
                
                renderCarDetails(data); // Re-run to add the STH Comparison Slider if needed
                renderRelatedSections(data, cases); // Fill in the Variants and Treasures
                
            } catch (e) {
                console.error("Data Load Error:", e);
            }
        }

        // --- 2. MAIN RENDER LOGIC ---
        function renderCarDetails(data) {
            const ext = data.ImageExt || "jpg";
            const mainImageUrl = `Cars/${carId}.${ext}`;

            document.getElementById("car-model").innerText = data.Model;
            
            const cases = Array.isArray(data.Case) ? data.Case : [data.Case];
            document.getElementById("car-case").innerHTML = "<strong>Case:</strong> " + cases.map(c => 
                `<a href="case.html?name=${encodeURIComponent(c)}" style="color: #2196F3; text-decoration: none; border-bottom: 1px dashed #2196F3;">${c}</a>`
            ).join(', ');

            const typeDiv = document.getElementById("car-type");
            if (data["Super TH"]) {
                typeDiv.innerHTML = `<a href="treasures.html?type=STH" style="text-decoration: none; color: inherit; display: block;">SUPER TREASURE HUNT 🔥</a>`;
                typeDiv.style.color = "#e67e22"; 
                typeDiv.style.backgroundColor = "#fff5e6";
                typeDiv.style.cursor = "pointer";
            } else if (data["TH"]) {
                typeDiv.innerHTML = `<a href="treasures.html?type=TH" style="text-decoration: none; color: inherit; display: block;">TREASURE HUNT 💎</a>`;
                typeDiv.style.color = "#95a5a6"; 
                typeDiv.style.backgroundColor = "#f2f2f2";
                typeDiv.style.cursor = "pointer";
            } else {
                typeDiv.innerText = "Mainline";
                typeDiv.style.color = "#666"; 
                typeDiv.style.backgroundColor = "transparent";
                typeDiv.style.cursor = "default";
            }

            // --- IMAGE / SLIDER LOGIC ---
            const frame = document.getElementById("car-image-frame");
            let dudCar = null;

            // Only search for a dud if cachedCars is loaded
            if (data["Super TH"] && cachedCars.length > 0) {
                dudCar = cachedCars.find(c => c.Model === data.Model && c["Super TH"] === false);
            }

            if (dudCar) {
                const dudExt = dudCar.ImageExt || "jpg";
                frame.innerHTML = `
                    <div class="sth-comparison-container" id="comparison-slider">
                        <img src="Cars/${carId}.${ext}" class="sth-comparison-image">
                        <div class="sth-comparison-overlay" id="comparison-overlay">
                            <img src="Cars/${dudCar.id}.${dudExt}" class="sth-comparison-image">
                        </div>
                        <div class="sth-comparison-handle" id="comparison-handle"></div>
                    </div>
                `;
                activateSlider();
            } else {
                frame.innerHTML = `<img id="car-image" src="${mainImageUrl}" style="max-width: 100%; max-height: 100%; object-fit: contain; cursor: zoom-in;">`;
                document.getElementById("car-image").onclick = () => {
                    document.getElementById("lightbox-img").src = mainImageUrl;
                    document.getElementById("lightbox").style.display = 'flex';
                };
            }

            document.getElementById("loading").style.display = "none";
        }

        // --- 3. RELATED SECTIONS (THE MISSING PIECES) ---
        function renderRelatedSections(currentCar, cases) {
            const treasureSection = document.getElementById("treasure-section-outside");
            
            // If the collection is still loading, don't clear the section yet
            if (cachedCars.length === 0) return;

            treasureSection.innerHTML = ""; // Now clear it for real data

            // Filter "Found With"
            const foundTreasures = cachedCars.filter(c => 
                c.id !== currentCar.id && 
                (c["Super TH"] || c["TH"]) && 
                (Array.isArray(c.Case) ? c.Case.some(val => cases.includes(val)) : cases.includes(c.Case))
            );

            if (foundTreasures.length > 0) {
                const wrapper = document.createElement("div");
                wrapper.innerHTML = `<h2 style="margin-top:30px;">Can be found with:</h2><div class="related-grid" id="treasures-grid"></div>`;
                treasureSection.appendChild(wrapper);
                appendItems("treasures-grid", foundTreasures);
            }

            // Filter "Variants"
            const variants = cachedCars.filter(c => c.Model === currentCar.Model && c.id !== currentCar.id);
            if (variants.length > 0) {
                const wrapper = document.createElement("div");
                wrapper.innerHTML = `<h2 style="margin-top:40px;">Other variants:</h2><div class="related-grid" id="variants-grid"></div>`;
                treasureSection.appendChild(wrapper);
                appendItems("variants-grid", variants);
            }
        }

        function appendItems(gridId, dataList) {
            const grid = document.getElementById(gridId);
            grid.style = "display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 250px)); gap: 20px; justify-content: center; padding: 20px;";

            dataList.forEach(item => {
                const itemExt = item.ImageExt || "jpg";
                const card = document.createElement("a");
                card.href = `carinfo.html?id=${item.id}`;
                card.className = "car-item";
                card.style = "text-decoration: none; color: #333; background: white; border: 1px solid #eee; border-radius: 12px; padding: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05);";
                card.innerHTML = `
                    <div style="width: 100%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; background: #eee; border-radius: 8px; overflow: hidden; margin-bottom: 10px;">
                        <img src="Cars/${item.id}.${itemExt}" loading="lazy" style="max-width: 100%; max-height: 100%; object-fit: contain;">
                    </div>
                    <div style="font-weight: bold; font-size: 0.9em;">${item.Model}</div>
                `;
                grid.appendChild(card);
            });
        }

        // --- SEARCH & SLIDER HELPERS ---
        window.handleGlobalSearch = function() {
            const queryVal = document.getElementById('global-search').value.toLowerCase().trim();
            const dropdown = document.getElementById('search-dropdown');
            if (queryVal.length < 2) { dropdown.style.display = 'none'; return; }
            const matches = cachedCars.filter(car => car.Model.toLowerCase().includes(queryVal)).slice(0, 10);
            
            dropdown.innerHTML = "";
            matches.forEach(car => {
                const div = document.createElement("div");
                div.className = "search-suggestion";
                div.innerHTML = car.Model;
                div.onclick = () => window.location.href = `carinfo.html?id=${car.id}`;
                dropdown.appendChild(div);
            });
            dropdown.style.display = 'block';
        }

        function activateSlider() {
            const slider = document.getElementById('comparison-slider');
            const overlay = document.getElementById('comparison-overlay');
            const handle = document.getElementById('comparison-handle');
            if (!handle) return;
            let isDragging = false;
            const handleMove = (e) => {
                if (!isDragging) return;
                let rect = slider.getBoundingClientRect();
                let x = (e.clientX || (e.touches ? e.touches[0].clientX : 0)) - rect.left;
                let perc = Math.max(5, Math.min(95, (x / rect.width) * 100));
                handle.style.left = perc + '%';
                overlay.style.clipPath = `inset(0 0 0 ${perc}%)`;
            };
            handle.addEventListener('mousedown', () => isDragging = true);
            handle.addEventListener('touchstart', () => isDragging = true);
            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('touchend', () => isDragging = false);
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('touchmove', handleMove);
        }

        loadData();
    </script>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="">
    </div>
</body>
</html>
