<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://firebasestorage.googleapis.com">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Car Details - Maniko Hot Wheels</title>
    <meta name="description" content="Loading Hot Wheels car details...">
    <meta property="og:title" content="Maniko Hot Wheels Database">
    <meta property="og:description" content="View details and high-res images.">
    <meta property="og:image" content="">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-V3WYKC0X1Q"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-V3WYKC0X1Q');
    </script>

    <title>Car Details - Maniko Hot Wheels</title>
    <link rel="icon" type="image/png" href="https://github.com/maniko-games/website/blob/main/Images/sth.webp?raw=true">
    <link rel="stylesheet" href="style.css?v=1.1">
</head>

<body style="font-family: sans-serif; text-align: center; padding: 0 20px 20px 20px; background-color: #f9f9f9;">
    <div class="header-spacer"></div>
    
    <div id="details-container" style="max-width: 540px; margin: 0 auto; background: white; border-radius: 15px; padding: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
        
        <div id="loading" style="font-style: italic; color: #999; margin-bottom: 10px;">Loading details...</div>

        <div id="car-content">
            <div id="car-image-frame" style="width: 100%; max-width: 500px; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; overflow: hidden; background-color: #eee; border-radius: 15px; margin: 0 auto 20px auto; padding: 20px; border: 1px solid #eee;">
                <img id="car-image" src="" style="max-width: 100%; max-height: 100%; object-fit: contain;">
            </div>
            <h1 id="car-model">---</h1>
            <p id="car-year"><strong>Year: ---</strong></p>
            <p id="car-collector">Collector #: ---</p>
            <p id="car-case">Case: ---</p>
            <p id="car-series">Series: ---</p>
            <p id="car-type" style="font-weight: bold;"></p>
            <p id="car-icons" align-items: center;"></p>
            <div id="collection-controls" style="display: none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; gap: 10px; justify-content: center; flex-wrap: wrap;">
                <button id="btn-collection" class="btn-main btn-collection">
                    Add to Collection
                </button>
                <button id="btn-wishlist" class="btn-main btn-wishlist">
                    Add to Wishlist
                </button>
            </div>
        </div>
    </div>
    <div id="treasure-section-outside" style="max-width: 1200px; margin: 40px auto 0 auto;"></div>

    <script type="module">
        import { injectSharedUI } from './components.js';
        import { app, db, adjustFontSizes } from './app.js';
        import { doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { firebaseConfig } from './app.js';
        import { arrayUnion, arrayRemove, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { auth } from './app.js';

        injectSharedUI();

        // 2. Setup Variables (The Data)
        let cachedCars = [];
        const urlParams = new URLSearchParams(window.location.search);
        const carId = urlParams.get('id');

        // 3. Instant UI Feedback (The "Smart" Title & Placeholder)
        if (carId) {
            const parts = carId.split('-');
            const tempName = parts.slice(0, -2).join(' ').toUpperCase();
            const yearPart = parts[parts.length - 1]; // Renamed to yearPart
            const caseLetter = parts[parts.length - 2];

            document.title = tempName + " - Maniko HW DB";

            // Logic to handle 2-digit years (like '26') vs 4-digit years
            let fullYear = yearPart.length === 2 ? `20${yearPart}` : yearPart;

            // Set placeholders immediately
            document.getElementById("car-model").innerText = tempName;
            adjustDetailsTitleSize();

            document.getElementById("car-year").innerHTML = `<strong>Year:</strong> ${fullYear}`;
            
            // FIX: Use 'yearPart' here instead of 'year'
            document.getElementById("car-case").innerText = `Case: ${caseLetter} - ${yearPart}`;
        }

        // --- 1. DATA PRELOAD (PARALLEL FETCHING) ---
        // --- 1. THE PARALLEL ENGINE ---
        async function loadData() {
            if (!carId) return;

            // Start BOTH tasks immediately
            const singleDocPromise = getDoc(doc(db, "mainline-cars", carId));
            const collectionPromise = getDocs(collection(db, "mainline-cars"));

            try {
                // STEP A: Get the specific car data first (FAST)
                const docSnap = await singleDocPromise;
                if (docSnap.exists()) {
                    const currentCarData = { id: docSnap.id, ...docSnap.data() };
                    renderCarDetails(currentCarData); // Show main image & info
                } else {
                    document.getElementById("loading").innerText = "Car not found!";
                    return;
                }

                // STEP B: Wait for the full database (background)
                const querySnapshot = await collectionPromise;
                cachedCars = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

                // STEP C: Now that we have the full DB, update Slider and Related Sections
                const data = { id: docSnap.id, ...docSnap.data() };
                const cases = Array.isArray(data.Case) ? data.Case : [data.Case];
                
                renderCarDetails(data); // Re-run to add the STH Comparison Slider if needed
                renderRelatedSections(data, cases); // Fill in the Variants and Treasures
                
            } catch (e) {
                console.error("Data Load Error:", e);
            }
        }

        async function setupCollectionButtons() {
            const collBtn = document.getElementById('btn-collection');
            const wishBtn = document.getElementById('btn-wishlist');

            if (collBtn) {
                collBtn.onclick = () => window.toggleOwnership('collection', carId, collBtn);
            }
            if (wishBtn) {
                wishBtn.onclick = () => window.toggleOwnership('wishlist', carId, wishBtn);
            }
        }

        // --- 2. MAIN RENDER LOGIC ---
        async function renderCarDetails(data) {
            const ext = data.ImageExt || "jpg";
            const mainImageUrl = `Cars/${carId}.${ext}`;

            document.getElementById("car-model").innerText = data.Model;
            adjustDetailsTitleSize();
            
            // 1. Render Year
            if (data.Year) {
                let yearValue = (typeof data.Year === 'string') ? data.Year.split('/').pop() : data.Year.id;
                document.getElementById("car-year").innerHTML = `<strong>Year:</strong> ${yearValue}`;
            }

            // 2. Render Collector #
            const collectorNum = data.CollectorNumber || "---";
            document.getElementById("car-collector").innerText = `Collector #: ${collectorNum}/250`;

            // 3. Render Case links
            const cases = Array.isArray(data.Case) ? data.Case : [data.Case];
            document.getElementById("car-case").innerHTML = "<strong>Case:</strong> " + cases.map(c => 
                `<a href="case.html?name=${encodeURIComponent(c)}" style="color: #2196F3; text-decoration: none; border-bottom: 1px dashed #2196F3;">${c}</a>`
            ).join(', ');

            // 4. Render Series & Series # (Handling the Reference)
            const seriesEl = document.getElementById("car-series");
            if (data.Series) {
                try {
                    // Fetch the document the reference points to
                    const seriesSnap = await getDoc(data.Series);
                    if (seriesSnap.exists()) {
                        const seriesData = seriesSnap.data();
                        const sNum = data.SeriesNumber || "-";
                        const sTotal = seriesData.TotalCars || "-";
                        
                        seriesEl.innerHTML = `<strong>Series:</strong> ${seriesData.Name} (${sNum}/${sTotal})`;
                    }
                } catch (e) {
                    console.error("Error fetching series reference:", e);
                    seriesEl.innerText = "Series: Error loading";
                }
            } else {
                seriesEl.innerText = "Series: Mainline";
            }

            // 5. Render Type & Special Status Icons
            const typeDiv = document.getElementById("car-type");
            const iconContainer = document.getElementById("car-icons");

            // --- A. TEXT CATEGORY (Pick the primary one) ---
            if (data["Premium"]) {
                typeDiv.innerText = "Premium";
                typeDiv.style.color = "#D4AF37"; // A deeper gold for readability
            } else if (data["Silver Series"]) {
                typeDiv.innerText = "Silver Series";
                typeDiv.style.color = "#808285"; 
            } else if (data["Color Shifter"]) {
                typeDiv.innerHTML = '<span style="color: #0071CE;">Color</span> <span style="color: #FFB81C;">Shifter</span>';
                typeDiv.style.textShadow = "0.5px 0.5px 0px rgba(0,0,0,0.1)"; 
            } else if (data["Multipack Exclusive"]) {
                typeDiv.innerText = "Multipack Exclusive";
                typeDiv.style.color = "#E31B23"; 
            } else {
                typeDiv.innerText = "Mainline";
                typeDiv.style.color = "#666"; 
            }

            // --- B. SPECIAL STATUS ICONS (Can display multiple) ---
            let iconHTML = "";

            if (data["Super TH"]) {
                iconHTML += `<a href="treasures.html?type=STH"><img src="Images/sth.webp" alt="STH" style="height:48px; margin-left:5px;" title="Super Treasure Hunt"></a>`;
            }
            if (data["TH"]) {
                iconHTML += `<a href="treasures.html?type=TH"><img src="Images/th.png" alt="TH" style="height:48px; margin-left:5px;" title="Treasure Hunt"></a>`;
            }
            if (data["Chase"]) {
                iconHTML += `<img src="Images/chase.png" alt="Chase" style="height:48px; margin-left:5px;" title="Chase Car">`;
            }
            if (data["Walmart Exclusive"]) {
                iconHTML += `<img src="Images/walmart.webp" alt="Walmart Exclusive" style="height:48px; margin-left:5px;" title="Walmart Exclusive">`;
            }

            // Render the icons into their dedicated container
            if (iconContainer) {
                iconContainer.innerHTML = iconHTML;
            }

            // --- IMAGE / SLIDER LOGIC ---
            const frame = document.getElementById("car-image-frame");
            let dudCar = null;

            if (data["Super TH"] && cachedCars.length > 0) {
                const currentCases = Array.isArray(data.Case) ? data.Case : [data.Case];
                dudCar = cachedCars.find(c => {
                    const sameModel = c.Model === data.Model;
                    const isMainline = c["Super TH"] === false;
                    const carCases = Array.isArray(c.Case) ? c.Case : [c.Case];
                    const sharedCase = carCases.some(val => currentCases.includes(val));
                    return sameModel && isMainline && sharedCase;
                });
            }

            if (dudCar) {
                const dudExt = dudCar.ImageExt || "jpg";
                frame.innerHTML = `
                    <div class="sth-comparison-container" id="comparison-slider">
                        <img src="Cars/${carId}.${ext}" class="sth-comparison-image">
                        <div class="sth-comparison-overlay" id="comparison-overlay">
                            <img src="Cars/${dudCar.id}.${dudExt}" class="sth-comparison-image">
                        </div>
                        <div class="sth-comparison-handle" id="comparison-handle"></div>
                    </div>
                `;
                activateSlider();
            } else {
                frame.innerHTML = `<img id="car-image" src="${mainImageUrl}" style="max-width: 100%; max-height: 100%; object-fit: contain; cursor: zoom-in;">`;
                document.getElementById("car-image").onclick = () => {
                    document.getElementById("lightbox-img").src = mainImageUrl;
                    document.getElementById("lightbox").style.display = 'flex';
                };
            }

            document.getElementById("loading").style.display = "none";
        }

        // --- 3. RELATED SECTIONS (THE MISSING PIECES) ---
        function renderRelatedSections(currentCar, cases) {
            const treasureSection = document.getElementById("treasure-section-outside");
            
            // If the collection is still loading, don't clear the section yet
            if (cachedCars.length === 0) return;

            treasureSection.innerHTML = ""; // Now clear it for real data

            // Filter "Found With"
            const foundTreasures = cachedCars.filter(c => 
                c.id !== currentCar.id && 
                (c["Super TH"] || c["TH"]) && 
                (Array.isArray(c.Case) ? c.Case.some(val => cases.includes(val)) : cases.includes(c.Case))
            );

            if (foundTreasures.length > 0) {
                const wrapper = document.createElement("div");
                wrapper.innerHTML = `<h2 style="margin-top:30px;">Can be found with:</h2><div class="related-grid" id="treasures-grid"></div>`;
                treasureSection.appendChild(wrapper);
                appendItems("treasures-grid", foundTreasures);
            }

            // Filter "Variants"
            const variants = cachedCars.filter(c => c.Model === currentCar.Model && c.id !== currentCar.id);
            if (variants.length > 0) {
                const wrapper = document.createElement("div");
                wrapper.innerHTML = `<h2 style="margin-top:40px;">Other variants:</h2><div class="related-grid" id="variants-grid"></div>`;
                treasureSection.appendChild(wrapper);
                appendItems("variants-grid", variants);
            }
        }

        function appendItems(gridId, dataList) {
            const grid = document.getElementById(gridId);
            grid.style = "display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 250px)); gap: 20px; justify-content: center; padding: 20px;";

            dataList.forEach(item => {
                const itemExt = item.ImageExt || "jpg";
                const card = document.createElement("a");
                card.href = `carinfo.html?id=${item.id}`;
                card.className = "car-item";
                card.style = "text-decoration: none; color: #333; background: white; border: 1px solid #eee; border-radius: 12px; padding: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05);";
                card.innerHTML = `
                    <div style="width: 100%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; background: #eee; border-radius: 8px; overflow: hidden; margin-bottom: 10px;">
                        <img src="Cars/${item.id}.${itemExt}" loading="lazy" style="max-width: 100%; max-height: 100%; object-fit: contain;">
                    </div>
                    <div style="font-weight: bold; font-size: 0.9em;">${item.Model}</div>
                `;
                grid.appendChild(card);
            });
        }

        function activateSlider() {
            const slider = document.getElementById('comparison-slider');
            const overlay = document.getElementById('comparison-overlay');
            const handle = document.getElementById('comparison-handle');
            if (!handle) return;
            let isDragging = false;
            const handleMove = (e) => {
                if (!isDragging) return;
                let rect = slider.getBoundingClientRect();
                let x = (e.clientX || (e.touches ? e.touches[0].clientX : 0)) - rect.left;
                let perc = Math.max(5, Math.min(95, (x / rect.width) * 100));
                handle.style.left = perc + '%';
                overlay.style.clipPath = `inset(0 0 0 ${perc}%)`;
            };
            handle.addEventListener('mousedown', () => isDragging = true);
            handle.addEventListener('touchstart', () => isDragging = true);
            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('touchend', () => isDragging = false);
            window.addEventListener('mousemove', handleMove);
            window.addEventListener('touchmove', handleMove);
        }

        loadData();

        // Check if user already owns this car when the page loads
        async function checkCurrentStatus(user) {
            if (!user) return;
            const userSnap = await getDoc(doc(db, "users", user.uid));
            if (userSnap.exists()) {
                const data = userSnap.data();
                const collBtn = document.getElementById('btn-collection');
                const wishBtn = document.getElementById('btn-wishlist');

                // Use window.updateButtonUI (the global one from app.js)
                if (data.collection?.includes(carId)) window.updateButtonUI(collBtn, 'collection', true);
                if (data.wishlist?.includes(carId)) window.updateButtonUI(wishBtn, 'wishlist', true);
            }
            document.getElementById('collection-controls').style.display = 'flex';
        }

        // Hook into Auth state
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        onAuthStateChanged(auth, (user) => {
            if (user) {
                checkCurrentStatus(user);
            } else {
                document.getElementById('collection-controls').style.display = 'flex';
                // Reset buttons if user logs out
                updateButtonUI('collection', false);
                updateButtonUI('wishlist', false);
            }
        });

        function adjustDetailsTitleSize() {
            const title = document.getElementById('car-model');
            const container = document.getElementById('details-container');
            
            // Starting font size in pixels (matches 2.5rem roughly)
            let fontSize = 40; 
            title.style.fontSize = fontSize + 'px';

            // Shrink font size until it fits within the container width 
            // or until it reaches a minimum readable size (20px)
            while (title.scrollWidth > (container.offsetWidth - 60) && fontSize > 20) {
                fontSize -= 2;
                title.style.fontSize = fontSize + 'px';
            }
        }

        setupCollectionButtons();
    </script>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="">
    </div>
</body>
</html>
