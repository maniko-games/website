<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Maniko Studio Backdrop</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevent scrolling */
            font-family: 'Arial', 'Helvetica', sans-serif; /* Bold, industrial font */
            background: #222; /* Fallback color */
        }

        #car-ghost-preview {
            aspect-ratio: 1 / 1; 
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 10;
        }

        #central-studio-hub {
            display: flex;
            flex-direction: row-reverse; /* This SWAPS the car and text positions */
            align-items: stretch;
            justify-content: center;
            height: 500px;
            gap: 20px;
            z-index: 10;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: auto;
        }

        #data-block {
            border-right: 5px solid #FF9800;
            /* width: auto and aspect-ratio make it a perfect square */
            width: auto; 
            aspect-ratio: 1 / 1; 
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            background: rgba(255, 255, 255, 0.05);
            padding: 35px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 20;
            box-sizing: border-box; /* Ensures padding doesn't break the square */
        }

        .data-pair {
            display: flex;
            justify-content: space-between;
            margin-bottom: 18px; /* Tighter spacing */
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }

        #ghost-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            /* Slight brightness boost to make your photos look studio-clean */
            filter: brightness(1.05); 
        }

        #model-title {
            font-size: 1.6em; /* Slightly smaller title */
            color: #FF9800;
            margin-bottom: 30px;
            margin-top: 0;
            text-transform: uppercase;
            line-height: 1.1;
        }

        /* 1. The Garage Background Image */
        #studio-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* UPDATE THIS URL TO YOUR GARAGE IMAGE */
            background-image: url('Images/studio-bg.jpg');
            background-size: cover;
            background-position: center;
            filter: grayscale(20%) brightness(70%); /* Desaturate/dim to make text pop */
            z-index: 1;
        }

        /* 2. Overlays & Gradients for readability */
        #studio-screen::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Dark gradient on the left for text, clear on the right for the car */
            background: linear-gradient(to right, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 60%);
            z-index: 2;
        }

        .data-label {
            color: #aaa; /* Dimmed label */
            text-transform: uppercase;
            font-size: 1em;
            letter-spacing: 2px;
        }

        .data-value {
            color: #eee;
            font-size: 1em;
            text-align: right;
        }

        /* Special STH/TH indicator */
        #treasure-indicator {
            position: absolute;
            bottom: 5%;
            left: 5%;
            padding: 15px 30px;
            background: #e74c3c; /* Fire Red for STH */
            color: white;
            font-weight: bold;
            font-size: 1.5em;
            border-radius: 5px;
            display: none; /* Hidden by default */
            z-index: 11;
        }

        /* The loading state */
        #loading-msg {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 2em;
            z-index: 100;
        }

    </style>
</head>
<body>
    <div id="studio-screen"></div>

    <div id="central-studio-hub">
        <div id="data-block" style="display: none;">
            <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center;">
                <h1 id="model-title" style="margin-bottom: 30px;">LOADING...</h1>

                <div class="data-pair"><span class="data-label">Year:</span><span class="data-value" id="val-year">---</span></div>
                <div class="data-pair"><span class="data-label">Collector #:</span><span class="data-value" id="val-collector">---</span></div>
                <div class="data-pair"><span class="data-label">Series:</span><span class="data-value" id="val-series">---</span></div>
                <div class="data-pair"><span class="data-label">Series #:</span><span class="data-value" id="val-series-num">---</span></div>
            </div>
        </div>

        <div id="car-ghost-preview">
            <img id="ghost-img" src="">
        </div>
    </div>

    <div id="loading-msg">INITIALIZING STUDIO...</div>
    
    <div id="no-id-container" style="display: none; background: rgba(0,0,0,0.5); padding: 40px; border-radius: 20px; backdrop-filter: blur(10px); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; color: white; text-align: center;">
        <h2 style="text-transform: uppercase;">Enter Car ID</h2>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <input type="text" id="manual-id-input" placeholder="e.g. 73-honda-civic-custom" style="padding: 12px; border-radius: 8px; border: none; width: 250px;">
            <button onclick="openManualId()" style="padding: 12px 20px; background: #FF9800; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer;">OPEN</button>
        </div>
    </div>

    <div id="treasure-indicator"></div>

    <script type="module">
        import { injectSharedUI } from './components.js';
        injectSharedUI();
        
        import { db } from './app.js';
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        const urlParams = new URLSearchParams(window.location.search);
        const carId = urlParams.get('id');
        const mode = urlParams.get('mode');

        window.openManualId = function() {
            const id = document.getElementById('manual-id-input').value.trim();
            if (id) {
                window.location.search = `?id=${id}`;
            }
        };

        async function initStudio() {
            // --- NEW: POSTCARD MODE LOGIC ---
            if (mode === 'postcard') {
                const rawData = sessionStorage.getItem('tempPostcard');
                if (rawData) {
                    const data = JSON.parse(rawData);
                    renderStudioUI(data, data.photo); // photo is the base64 from camera
                    return;
                }
            }

            if (!carId) {
                document.getElementById('loading-msg').style.display = 'none';
                document.getElementById('no-id-container').style.display = 'block';
                
                // Allow "Enter" key to work in the input
                document.getElementById('manual-id-input').addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') window.openManualId();
                });
                return;
            }

            try {
                const docSnap = await getDoc(doc(db, "mainline-cars", carId));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    // Resolve Series Reference if it exists
                    let seriesName = "Mainline";
                    if (data.Series) {
                        const sSnap = await getDoc(data.Series);
                        if (sSnap.exists()) seriesName = sSnap.data().Name;
                    }

                    // Prepare data object for rendering
                    const renderData = {
                        Model: data.Model,
                        Year: typeof data.Year === 'string' ? data.Year.split('/').pop() : data.Year.id,
                        CollectorNumber: data.CollectorNumber,
                        SeriesName: seriesName,
                        SeriesNumber: data.SeriesNumber,
                        isSTH: data["Super TH"],
                        isTH: data["TH"]
                    };

                    const ext = data.ImageExt || "jpg";
                    renderStudioUI(renderData, `Cars/${carId}.${ext}`);
                } else {
                    document.getElementById('loading-msg').innerText = "❌ CAR NOT FOUND";
                }
            } catch (e) {
                console.error(e);
                document.getElementById('loading-msg').innerText = "❌ STUDIO ERROR";
            }
        }

        // Toggle Ghost Image with 'H' key
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'h') {
                const ghostDiv = document.getElementById("car-ghost-preview");
                // Toggle between fully visible and hidden
                if (ghostDiv) {
                    ghostDiv.style.opacity = (ghostDiv.style.opacity === "0") ? "1" : "0";
                }
            }
        });

        // Centered function to handle the UI updates
        function renderStudioUI(data, imagePath) {
            document.getElementById("model-title").innerText = data.Model || data.model;
            document.getElementById("val-year").innerText = data.Year || data.year;
            
            const coll = data.CollectorNumber || data.collector;
            document.getElementById("val-collector").innerText = coll ? `${coll}/250` : "---";
            
            const sName = data.SeriesName || data.series;
            document.getElementById("val-series").innerText = sName || "Mainline";
            
            const sNum = data.SeriesNumber || data.seriesNum;
            document.getElementById("val-series-num").innerText = sNum ? `${sNum}/10` : "---";

            // Treasure Indicator
            const treasureDiv = document.getElementById("treasure-indicator");
            if (data.isSTH || data.type === "Super TH") {
                treasureDiv.innerText = "SUPER TREASURE HUNT";
                treasureDiv.style.background = "#e67e22";
                treasureDiv.style.display = "block";
            } else if (data.isTH || data.type === "Treasure Hunt") {
                treasureDiv.innerText = "TREASURE HUNT";
                treasureDiv.style.background = "#95a5a6";
                treasureDiv.style.display = "block";
            }

            // Ghost Image
            const ghostImg = document.getElementById("ghost-img");
            if (ghostImg && imagePath) ghostImg.src = imagePath;

            document.getElementById('loading-msg').style.display = 'none';
            document.getElementById('data-block').style.display = 'block';

            // If in postcard mode, show the photo immediately
            if (window.location.search.includes('mode=postcard')) {
                document.getElementById('car-ghost-preview').style.opacity = '1';
            }
        }

        initStudio();
    </script>
</body>
</html>
